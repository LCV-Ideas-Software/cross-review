name: Auto-tag on version bump
# Organization version display convention: public tags/releases use
# vXX.XX.XX with zero-padded numeric segments. package.json keeps npm SemVer
# shape and may include prerelease labels; the display tag is derived from the
# numeric base version.
#
# The tag is created only after the CI workflow has completed successfully for
# a push to main. GitHub does not start a second workflow from a tag push
# created with GITHUB_TOKEN, so this workflow explicitly dispatches publish.yml
# *on that tag ref*. Re-running a version-bump run safely redispatches an
# existing tag only when it still resolves to the exact verified commit.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
permissions: write-all
concurrency:
  group: auto-tag-main
  queue: max
  cancel-in-progress: false
jobs:
  auto-tag:
    name: Create org-standard tag from package.json version
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout CI-verified main commit with full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Setup Node.js 24 for release-policy validation
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Verify checked out commit is the successful CI commit on live main history
        id: verified
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          if [ "$CHECKED_OUT_SHA" != "$VERIFIED_SHA" ]; then
            echo "matches=false" >> "$GITHUB_OUTPUT"
            echo "::error::Checkout $CHECKED_OUT_SHA does not match CI-verified $VERIFIED_SHA."
            exit 1
          fi
          LIVE_MAIN_SHA="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          relation="$(gh api --method GET "repos/$GITHUB_REPOSITORY/compare/${VERIFIED_SHA}...${LIVE_MAIN_SHA}" --jq '.status')"
          if [ "$relation" != "ahead" ] && [ "$relation" != "identical" ]; then
            echo "matches=false" >> "$GITHUB_OUTPUT"
            echo "::error::CI-verified commit $VERIFIED_SHA is no longer in live main history at $LIVE_MAIN_SHA (compare status: $relation)."
            exit 0
          fi
          echo "matches=true" >> "$GITHUB_OUTPUT"
          echo "Verified successful CI commit $VERIFIED_SHA in live main history at $LIVE_MAIN_SHA."
      - name: Detect an actual package version change
        if: steps.verified.outputs.matches == 'true'
        id: version-change
        env:
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          node scripts/release-policy.mjs validate-semver "$CURRENT_VERSION"
          TAG="$(node scripts/release-policy.mjs display-tag "$CURRENT_VERSION")"
          LEGACY_TAG="v${CURRENT_VERSION}"
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "legacy_tag=$LEGACY_TAG" >> "$GITHUB_OUTPUT"

          # Record the first-parent boundary where this version epoch began.
          # If an earlier auto-tag run failed before creating a tag, a later
          # successful CI commit in the same epoch can safely become the new
          # release target after its own exact-SHA gates pass.
          VERSION_BOUNDARY_SHA="$VERIFIED_SHA"
          cursor="$VERIFIED_SHA"
          while parent="$(git rev-list --parents -n 1 "$cursor" | awk '{print $2}')" && [ -n "$parent" ]; do
            if ! parent_package="$(git show "$parent:package.json" 2>/dev/null)"; then
              break
            fi
            parent_version="$(node -e '
              let input = "";
              process.stdin.setEncoding("utf8");
              process.stdin.on("data", (chunk) => { input += chunk; });
              process.stdin.on("end", () => process.stdout.write(JSON.parse(input).version));
            ' <<<"$parent_package")"
            if [ "$parent_version" != "$CURRENT_VERSION" ]; then
              break
            fi
            VERSION_BOUNDARY_SHA="$parent"
            cursor="$parent"
          done
          echo "version_boundary_sha=$VERSION_BOUNDARY_SHA" >> "$GITHUB_OUTPUT"
          echo "release_candidate_sha=$VERIFIED_SHA" >> "$GITHUB_OUTPUT"

          FIRST_PARENT="$(git rev-list --parents -n 1 HEAD | awk '{print $2}')"
          if [ -z "$FIRST_PARENT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "The initial commit establishes package version $CURRENT_VERSION."
            exit 0
          fi
          if PARENT_PACKAGE="$(git show "$FIRST_PARENT:package.json" 2>/dev/null)"; then
            PARENT_VERSION="$(node -e '
              let input = "";
              process.stdin.setEncoding("utf8");
              process.stdin.on("data", (chunk) => { input += chunk; });
              process.stdin.on("end", () => process.stdout.write(JSON.parse(input).version));
            ' <<<"$PARENT_PACKAGE")"
            if [ "$CURRENT_VERSION" = "$PARENT_VERSION" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "package.json version remains $CURRENT_VERSION; no release tag is required."
              exit 0
            fi
            echo "Package version changed from $PARENT_VERSION to $CURRENT_VERSION."
          else
            echo "The first parent has no package.json; treating $CURRENT_VERSION as a version introduction."
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Resolve immutable release target
        if: steps.verified.outputs.matches == 'true'
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version-change.outputs.tag }}
          LEGACY_TAG: ${{ steps.version-change.outputs.legacy_tag }}
          VERSION: ${{ steps.version-change.outputs.version }}
          VERSION_BOUNDARY_SHA: ${{ steps.version-change.outputs.version_boundary_sha }}
          RELEASE_CANDIDATE_SHA: ${{ steps.version-change.outputs.release_candidate_sha }}
        run: |
          set -euo pipefail
          resolve_remote_tag() {
            local tag="$1"
            local ref_json ref_error object_type object_sha tag_json status
            ref_error="$RUNNER_TEMP/tag-ref-${GITHUB_RUN_ID}-${tag//[^A-Za-z0-9._-]/_}.err"
            if ref_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$tag" 2>"$ref_error")"; then
              :
            else
              status=$?
              if grep -q 'HTTP 404' "$ref_error"; then
                return 2
              fi
              cat "$ref_error" >&2
              return "$status"
            fi
            object_type="$(jq -er '.object.type' <<<"$ref_json")"
            object_sha="$(jq -er '.object.sha' <<<"$ref_json")"
            for _ in {1..10}; do
              if [ "$object_type" = "commit" ]; then
                printf '%s' "$object_sha"
                return 0
              fi
              if [ "$object_type" != "tag" ]; then
                echo "::error::Tag $tag resolves to unsupported Git object type '$object_type'." >&2
                return 1
              fi
              tag_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/tags/$object_sha")"
              object_type="$(jq -er '.object.type' <<<"$tag_json")"
              object_sha="$(jq -er '.object.sha' <<<"$tag_json")"
            done
            echo "::error::Tag $tag exceeds the maximum annotated-tag peel depth." >&2
            return 1
          }
          read_optional_tag() {
            local tag="$1" value status
            if value="$(resolve_remote_tag "$tag")"; then
              printf '%s' "$value"
              return 0
            else
              status=$?
            fi
            if [ "$status" -eq 2 ]; then
              return 0
            fi
            return "$status"
          }
          assert_ancestor() {
            local ancestor="$1" descendant="$2" relation
            relation="$(gh api --method GET "repos/$GITHUB_REPOSITORY/compare/${ancestor}...${descendant}" --jq '.status')"
            if [ "$relation" != "ahead" ] && [ "$relation" != "identical" ]; then
              echo "::error::Commit $ancestor is not an ancestor of $descendant (compare status: $relation)."
              exit 1
            fi
          }

          canonical_sha="$(read_optional_tag "$TAG")"
          legacy_sha="$(read_optional_tag "$LEGACY_TAG")"
          if [ -n "$canonical_sha" ] && [ -n "$legacy_sha" ] && [ "$canonical_sha" != "$legacy_sha" ]; then
            echo "::error::Canonical tag $TAG ($canonical_sha) and legacy tag $LEGACY_TAG ($legacy_sha) disagree."
            exit 1
          fi

          target_sha="${canonical_sha:-$legacy_sha}"
          if [ -z "$target_sha" ]; then
            # No release identity exists yet. Use this later successful CI
            # commit, not an unverified historical bump, while retaining the
            # recorded boundary as audit evidence for the version epoch.
            target_sha="$RELEASE_CANDIDATE_SHA"
            release_pages="$(gh api --method GET --paginate --slurp \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/$GITHUB_REPOSITORY/releases?per_page=100")"
            release_count="$(jq -er --arg tag "$TAG" \
              '[.[][] | select(.tag_name == $tag)] | length' \
              <<<"$release_pages")"
            if [ "$release_count" -gt 0 ]; then
              echo "::error::Release $TAG exists without its tag; refusing to recreate identity at $target_sha."
              exit 1
            fi
          fi

          assert_ancestor "$VERSION_BOUNDARY_SHA" "$target_sha"
          assert_ancestor "$target_sha" "$RELEASE_CANDIDATE_SHA"
          target_package="$(gh api --method GET "repos/$GITHUB_REPOSITORY/contents/package.json" -f ref="$target_sha" --jq '.content' | tr -d '\n' | base64 --decode)"
          target_version="$(node -e '
            let input = "";
            process.stdin.setEncoding("utf8");
            process.stdin.on("data", (chunk) => { input += chunk; });
            process.stdin.on("end", () => process.stdout.write(JSON.parse(input).version));
          ' <<<"$target_package")"
          if [ "$target_version" != "$VERSION" ]; then
            echo "::error::Release target $target_sha contains package version $target_version, expected $VERSION."
            exit 1
          fi

          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
          if [ -n "$canonical_sha" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Canonical tag $TAG already resolves to validated target $target_sha; publication will be reconciled idempotently."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Canonical tag $TAG will be created at validated target $target_sha (version epoch starts at $VERSION_BOUNDARY_SHA)."
          fi
      - name: Require every exact-SHA push workflow to pass
        if: >-
          steps.verified.outputs.matches == 'true' &&
          steps.check.outputs.should_dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.check.outputs.target_sha }}
        run: |
          set -euo pipefail
          bash scripts/require-release-push-workflows.sh "$TARGET_SHA"
      - name: Wait for exact CodeQL analyses and require zero results
        if: >-
          steps.verified.outputs.matches == 'true' &&
          steps.check.outputs.should_dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.check.outputs.target_sha }}
        run: |
          set -euo pipefail
          codeql_state="missing"
          for poll_attempt in {1..60}; do
            codeql_run="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow codeql.yml --commit "$TARGET_SHA" --event push --limit 1 --json databaseId,status,conclusion --jq 'sort_by(.databaseId) | last // null')"
            codeql_state="$(jq -r 'if . == null then "missing" else "\(.status):\(.conclusion // "")" end' <<<"$codeql_run")"
            if [ "$codeql_state" = "completed:success" ]; then
              echo "CodeQL completed successfully for $TARGET_SHA."
              break
            fi
            if [[ "$codeql_state" == completed:* ]]; then
              echo "::error::CodeQL finished as $codeql_state for $TARGET_SHA; refusing to tag."
              exit 1
            fi
            if [ "$poll_attempt" -eq 60 ]; then
              echo "::error::CodeQL did not complete successfully for $TARGET_SHA (last state: $codeql_state); refusing to tag."
              exit 1
            fi
            echo "Waiting for CodeQL on $TARGET_SHA ($poll_attempt/60; state: $codeql_state)."
            sleep 5
          done

          # Workflow completion and SARIF processing are distinct states. Read
          # the immutable analyses for TARGET_SHA itself: current main alert
          # state cannot prove that an older queued release commit was clean.
          required_codeql_categories=("/language:actions" "/language:javascript-typescript")
          for attempt in {1..12}; do
            analyses_json="$(gh api --paginate --slurp -H "Accept: application/vnd.github+json" "repos/$GITHUB_REPOSITORY/code-scanning/analyses?per_page=100")"
            target_analyses="$(jq -c --arg sha "$TARGET_SHA" '[.[][] | select(.commit_sha == $sha and .tool.name == "CodeQL")]' <<<"$analyses_json")"
            analyses_ready=true
            for category in "${required_codeql_categories[@]}"; do
              analysis="$(jq -c --arg category "$category" '[.[] | select(.category == $category)] | sort_by(.id) | last // null' <<<"$target_analyses")"
              if [ "$analysis" = "null" ]; then
                analyses_ready=false
                echo "Waiting for exact CodeQL analysis $category on $TARGET_SHA."
                continue
              fi
              analysis_error="$(jq -r '.error // ""' <<<"$analysis")"
              if [ -n "$analysis_error" ]; then
                echo "::error::CodeQL analysis $category failed processing for $TARGET_SHA: $analysis_error"
                exit 1
              fi
            done
            if [ "$analyses_ready" = true ]; then
              missing_category_count="$(jq '[.[] | select((.category // "") == "")] | length' <<<"$target_analyses")"
              if [ "$missing_category_count" -ne 0 ]; then
                echo "::error::Exact CodeQL evidence contains $missing_category_count analysis object(s) without a category for $TARGET_SHA."
                exit 1
              fi
              category_count=0
              while IFS= read -r category; do
                category_count=$((category_count + 1))
                analysis="$(jq -c --arg category "$category" '[.[] | select(.category == $category)] | sort_by(.id) | last' <<<"$target_analyses")"
                analysis_error="$(jq -r '.error // ""' <<<"$analysis")"
                if [ -n "$analysis_error" ]; then
                  echo "::error::CodeQL analysis $category failed processing for $TARGET_SHA: $analysis_error"
                  exit 1
                fi
                analysis_id="$(jq -er --arg category "$category" '[.[] | select(.category == $category)] | sort_by(.id) | last | .id' <<<"$target_analyses")"
                sarif_file="$RUNNER_TEMP/codeql-${analysis_id}.sarif"
                gh api -H "Accept: application/sarif+json" "repos/$GITHUB_REPOSITORY/code-scanning/analyses/$analysis_id" >"$sarif_file"
                result_count="$(jq '[.runs[]?.results[]?] | length' "$sarif_file")"
                if [ "$result_count" -ne 0 ]; then
                  echo "::error::Exact CodeQL analysis $category contains $result_count result(s) for $TARGET_SHA; refusing to tag."
                  jq -r '.runs[]?.results[]? | [.ruleId, (.level // "warning"), .message.text] | @tsv' "$sarif_file"
                  exit 1
                fi
              done < <(jq -r '[.[] | .category] | unique[]' <<<"$target_analyses")
              echo "All $category_count exact CodeQL SARIF categories contain zero results for $TARGET_SHA."
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Exact CodeQL analyses were not visible for both categories on $TARGET_SHA; refusing to tag."
              exit 1
            fi
            sleep 5
          done
          echo "Code-scanning gate passed on immutable SHA $TARGET_SHA."
      - name: Require triggered Dependabot updates to pass
        if: >-
          steps.verified.outputs.matches == 'true' &&
          steps.check.outputs.should_dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.check.outputs.target_sha }}
          VERSION_BOUNDARY_SHA: ${{ steps.version-change.outputs.version_boundary_sha }}
        run: |
          set -euo pipefail
          bash scripts/require-dependabot-release-evidence.sh require "$TARGET_SHA" "$VERSION_BOUNDARY_SHA"
      - name: Create tag through the GitHub API
        if: >-
          steps.verified.outputs.matches == 'true' &&
          steps.check.outputs.should_dispatch == 'true' &&
          steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version-change.outputs.tag }}
          TARGET_SHA: ${{ steps.check.outputs.target_sha }}
        run: |
          set -euo pipefail
          LIVE_MAIN_SHA="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          relation="$(gh api --method GET "repos/$GITHUB_REPOSITORY/compare/${TARGET_SHA}...${LIVE_MAIN_SHA}" --jq '.status')"
          if [ "$relation" != "ahead" ] && [ "$relation" != "identical" ]; then
            echo "::error::Tag target $TARGET_SHA left live main history at $LIVE_MAIN_SHA (compare status: $relation)."
            exit 1
          fi
          create_error="$RUNNER_TEMP/create-tag-${GITHUB_RUN_ID}.err"
          if ! gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="$TARGET_SHA" >/dev/null 2>"$create_error"; then
            ref_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG")"
            object_type="$(jq -er '.object.type' <<<"$ref_json")"
            existing_sha="$(jq -er '.object.sha' <<<"$ref_json")"
            for _ in {1..10}; do
              if [ "$object_type" = "commit" ]; then
                break
              fi
              if [ "$object_type" != "tag" ]; then
                echo "::error::Concurrent tag $TAG resolves to unsupported Git object type '$object_type'."
                exit 1
              fi
              tag_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/tags/$existing_sha")"
              object_type="$(jq -er '.object.type' <<<"$tag_json")"
              existing_sha="$(jq -er '.object.sha' <<<"$tag_json")"
            done
            if [ "$existing_sha" != "$TARGET_SHA" ]; then
              cat "$create_error" >&2
              echo "::error::Tag creation failed and ${TAG} resolves to ${existing_sha:-missing}, not $TARGET_SHA."
              exit 1
            fi
            echo "Tag ${TAG} was created concurrently at the exact verified SHA; continuing idempotently."
          fi
          echo "Created lightweight tag ${TAG} at ${TARGET_SHA} through the GitHub API."
      - name: Dispatch publish workflow
        if: >-
          steps.verified.outputs.matches == 'true' &&
          steps.check.outputs.should_dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version-change.outputs.tag }}
          TARGET_SHA: ${{ steps.check.outputs.target_sha }}
        run: |
          set -euo pipefail
          expected_sha="$TARGET_SHA"
          for attempt in {1..10}; do
            ref_error="$RUNNER_TEMP/dispatch-tag-${GITHUB_RUN_ID}.err"
            if ref_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" 2>"$ref_error")"; then
              object_type="$(jq -er '.object.type' <<<"$ref_json")"
              tag_sha="$(jq -er '.object.sha' <<<"$ref_json")"
              for _ in {1..10}; do
                if [ "$object_type" = "commit" ]; then
                  break
                fi
                if [ "$object_type" != "tag" ]; then
                  echo "::error::Tag $TAG resolves to unsupported Git object type '$object_type'."
                  exit 1
                fi
                tag_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/tags/$tag_sha")"
                object_type="$(jq -er '.object.type' <<<"$tag_json")"
                tag_sha="$(jq -er '.object.sha' <<<"$tag_json")"
              done
              if [ "$tag_sha" != "$expected_sha" ]; then
                echo "::error::Tag $TAG resolves to $tag_sha, expected $expected_sha; refusing to dispatch publish.yml."
                exit 1
              fi
              echo "Tag $TAG is visible through the authenticated API at exact target $expected_sha."
              break
            elif ! grep -q 'HTTP 404' "$ref_error"; then
              cat "$ref_error" >&2
              echo "::error::Could not safely resolve tag $TAG before dispatch."
              exit 1
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "::error::Tag ${TAG} was not visible through the authenticated API after creation; refusing to dispatch publish.yml."
              exit 1
            fi
            echo "Waiting for tag ${TAG} to become visible through the authenticated API (${attempt}/10)."
            sleep 2
          done
          gh workflow run publish.yml --repo "$GITHUB_REPOSITORY" --ref "${TAG}"
          echo "Dispatched publish.yml on protected tag ref ${TAG}; it will publish packages and create the GitHub Release."
    timeout-minutes: 90
