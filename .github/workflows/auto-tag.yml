name: Auto-tag on version bump
# Organization version display convention: public tags/releases use
# vXX.XX.XX with zero-padded numeric segments. package.json keeps npm SemVer
# shape and may include prerelease labels; the display tag is derived from the
# numeric base version.
#
# The tag is created only after the CI workflow has completed successfully for
# a push to main. GitHub does not start a second workflow from a tag push
# created with GITHUB_TOKEN, so this workflow explicitly dispatches publish.yml
# on the tag ref. The npm-production environment allows v* tag refs, not main.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
permissions:
  contents: read
concurrency:
  group: auto-tag-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false
jobs:
  auto-tag:
    name: Create org-standard tag from package.json version
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout CI-verified main commit with full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify checked out main still matches successful CI
        id: verified
        env:
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          if [ "$CHECKED_OUT_SHA" != "$VERIFIED_SHA" ]; then
            echo "matches=false" >> "$GITHUB_OUTPUT"
            echo "A newer main commit ($CHECKED_OUT_SHA) replaced CI-verified $VERIFIED_SHA; this run will not tag."
            exit 0
          fi
          echo "matches=true" >> "$GITHUB_OUTPUT"
          echo "Verified main at successful CI commit $VERIFIED_SHA."
      - name: Read package.json version and compute display tag
        if: steps.verified.outputs.matches == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?$ ]]; then
            echo "::error::Invalid version shape in package.json: '$VERSION'. Expected X.Y.Z or X.Y.Z-prerelease."
            exit 1
          fi
          BASE="$(echo "$VERSION" | sed -E 's/-.*$//')"
          TAG="$(echo "$BASE" | awk -F. '{ printf "v%02d.%02d.%02d", $1, $2, $3 }')"
          if [[ "$VERSION" == *-* ]]; then
            TAG="${TAG}-${VERSION#*-}"
          fi
          LEGACY_TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "legacy_tag=$LEGACY_TAG" >> "$GITHUB_OUTPUT"
          echo "Detected package version: $VERSION -> display tag: $TAG"
      - name: Check if tag already exists
        if: steps.verified.outputs.matches == 'true'
        id: check
        env:
          TAG: ${{ steps.version.outputs.tag }}
          LEGACY_TAG: ${{ steps.version.outputs.legacy_tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists; skipping."
          elif git ls-remote --exit-code --tags origin "refs/tags/${LEGACY_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Legacy SemVer tag ${LEGACY_TAG} already exists for this package version; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist; it will be created."
          fi
      - name: Create and push tag
        if: steps.verified.outputs.matches == 'true' && steps.check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" HEAD
          git push origin "${TAG}"
          echo "Created and pushed lightweight tag ${TAG}."
      - name: Dispatch publish workflow
        if: steps.verified.outputs.matches == 'true' && steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          expected_sha="$(git rev-parse HEAD)"
          for attempt in {1..10}; do
            tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1}')"
            peeled_sha="$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | awk '{print $1}')"
            if [ -n "${tag_sha}" ]; then
              if [ "${tag_sha}" = "${expected_sha}" ]; then
                echo "Tag ${TAG} is visible on origin as a lightweight tag at ${expected_sha}."
                break
              fi
              if [ "${peeled_sha}" = "${expected_sha}" ]; then
                echo "::warning::Tag ${TAG} is annotated but peels to ${expected_sha}; proceeding for compatibility. New auto-created tags are lightweight."
                break
              fi
              echo "::error::Tag ${TAG} points to ${tag_sha} (peeled: ${peeled_sha:-none}), expected ${expected_sha}; refusing to dispatch publish.yml."
              exit 1
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "::error::Tag ${TAG} was not visible on origin after push; refusing to dispatch publish.yml."
              exit 1
            fi
            echo "Waiting for tag ${TAG} to become visible on origin (${attempt}/10)."
            sleep 2
          done
          gh workflow run publish.yml --ref "${TAG}" -f tag="${TAG}"
          echo "Dispatched publish.yml for ${TAG}; it will publish packages and create the GitHub Release."
    timeout-minutes: 15
