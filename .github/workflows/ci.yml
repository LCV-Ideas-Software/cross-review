name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
env:
  NPM_CLI_VERSION: "12.0.1"
  NPM_CLI_SHA512: "2f94fd8bf600416416a934bfc59c4991e8bff7372ef7d842784e2a8b8d48c81555ee645069ddea73625fb8e92dc261feab0188fd5dab6c22fefd46316f5f9140"
jobs:
  verify:
    name: Build, lint and smoke
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"
      - name: Verify hash-locked Python tools and pre-commit config
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r socketsecurity-requirements.txt
          python scripts/validate-dependabot-config.py
          python -m pre_commit validate-config .pre-commit-config.yaml
          python -m pre_commit run --all-files --show-diff-on-failure
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Verify npm v12 toolchain
        shell: bash
        run: |
          set -euo pipefail
          ACTUAL_NPM_VERSION="$(npm --registry=https://registry.npmjs.org --version)"
          if [ "$ACTUAL_NPM_VERSION" != "$NPM_CLI_VERSION" ]; then
            echo "::error::Expected npm $NPM_CLI_VERSION, got $ACTUAL_NPM_VERSION."
            exit 1
          fi
          echo "Verified npm $ACTUAL_NPM_VERSION for npm v12 policy."
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          # StepSecurity proxy token is needed only while reading dependencies.
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Verify npm v12 CI and release policy
        run: npm --registry=https://registry.npmjs.org run npm-v12-release-security-regression
      - name: Format check (prettier)
        run: npm --registry=https://registry.npmjs.org run format:check
      - name: Lint (eslint)
        run: npm --registry=https://registry.npmjs.org run lint
      - name: Biome (lint + format)
        run: npm --registry=https://registry.npmjs.org run biome
      - name: Typecheck
        run: npm --registry=https://registry.npmjs.org run typecheck
      - name: Poll and cancellation runtime regression
        run: |
          npm --registry=https://registry.npmjs.org run build
          npm --registry=https://registry.npmjs.org run v4.5.16-poll-cancel-regression
      - name: Smoke tests
        run: npm --registry=https://registry.npmjs.org run smoke
        env:
          CROSS_REVIEW_STUB: "1"
          # v2.4.0 / P1.1 fail-fast: stub activation requires explicit
          # confirmation. The smoke harness is a legitimate stub consumer.
          CROSS_REVIEW_STUB_CONFIRMED: "1"
    timeout-minutes: 30
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
