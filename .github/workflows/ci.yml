name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
env:
  # StepSecurity Secure Registry auth for `npm ci`/`npm install` per project .npmrc.
  # Token is the StepSecurity API key with proxy read scope; never used for publish.
  STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
jobs:
  verify:
    name: Build, lint and smoke
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Format check (prettier)
        run: npm --registry=https://registry.npmjs.org run format:check
      - name: Lint (eslint)
        run: npm --registry=https://registry.npmjs.org run lint
      - name: Biome (lint + format)
        run: npm --registry=https://registry.npmjs.org run biome
      - name: Typecheck
        run: npm --registry=https://registry.npmjs.org run typecheck
      - name: Smoke tests
        run: npm --registry=https://registry.npmjs.org run smoke
        env:
          CROSS_REVIEW_STUB: "1"
          # v2.4.0 / P1.1 fail-fast: stub activation requires explicit
          # confirmation. The smoke harness is a legitimate stub consumer.
          CROSS_REVIEW_STUB_CONFIRMED: "1"
    timeout-minutes: 30
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
