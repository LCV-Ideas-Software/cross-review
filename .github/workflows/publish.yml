name: Publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/ref to publish, for example v02.03.00"
        required: false
        default: ""
permissions:
  contents: read
concurrency:
  group: publish-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false
env:
  # Pin the npm release toolchain so the gate exercises npm v12 install-time defaults.
  NPM_CLI_VERSION: "12.0.1"
  NPM_CLI_SHA512: "2f94fd8bf600416416a934bfc59c4991e8bff7372ef7d842784e2a8b8d48c81555ee645069ddea73625fb8e92dc261feab0188fd5dab6c22fefd46316f5f9140"
jobs:
  gate:
    name: Pre-publish gate (test + metadata)
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      display_tag: ${{ steps.meta.outputs.display_tag }}
      dist_tag: ${{ steps.meta.outputs.dist_tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Validate publish ref
        env:
          PUBLISH_REF: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$PUBLISH_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Publish ref must be a version tag (for example v02.03.00), got '$PUBLISH_REF'."
            exit 1
          fi
          echo "Validated publish ref: $PUBLISH_REF"
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0
      - name: Verify checked out tag identity
        env:
          PUBLISH_REF: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if ! git show-ref --verify --quiet "refs/tags/$PUBLISH_REF"; then
            echo "::error::Publish ref '$PUBLISH_REF' is not an existing tag."
            exit 1
          fi
          TAG_SHA="$(git rev-parse "refs/tags/$PUBLISH_REF^{commit}")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "::error::Checked out HEAD $HEAD_SHA does not match tag $PUBLISH_REF at $TAG_SHA."
            exit 1
          fi
          echo "Verified tag $PUBLISH_REF at $TAG_SHA."
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Pre-publish gate (format + lint + biome + typecheck)
        run: npm --registry=https://registry.npmjs.org run check
      - name: Verify
        run: npm --registry=https://registry.npmjs.org test
        env:
          CROSS_REVIEW_STUB: "1"
          # v2.4.0 / P1.1 fail-fast: stub activation requires explicit
          # confirmation. The smoke harness is a legitimate stub consumer.
          CROSS_REVIEW_STUB_CONFIRMED: "1"
      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          DISPLAY_TAG="$(echo "${VERSION%%-*}" | awk -F. '{ printf "v%02d.%02d.%02d", $1, $2, $3 }')"
          if [[ "$VERSION" == *-* ]]; then
            DISPLAY_TAG="${DISPLAY_TAG}-${VERSION#*-}"
          fi
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            TAG="$DISPLAY_TAG"
          fi
          if [ "$TAG" != "$DISPLAY_TAG" ]; then
            echo "::error::Publish tag '$TAG' does not match package.json version '$VERSION' (expected '$DISPLAY_TAG')."
            exit 1
          fi
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "display_tag=$DISPLAY_TAG" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publish metadata: $NAME@$VERSION -> $TAG ($DIST_TAG)"
    timeout-minutes: 60
  publish-npmjs:
    name: Publish to npmjs.com
    needs: gate
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Setup Node.js 24 for npmjs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # npm Trusted Publishing requires npm >=11.5.1.
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@lcv-ideas-software"
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Verify trusted publishing toolchain
        run: |
          set -euo pipefail
          node --version
          ACTUAL_NPM_VERSION="$(npm --registry=https://registry.npmjs.org --version)"
          if [ "$ACTUAL_NPM_VERSION" != "$NPM_CLI_VERSION" ]; then
            echo "::error::Expected npm $NPM_CLI_VERSION, got $ACTUAL_NPM_VERSION."
            exit 1
          fi
          echo "Verified npm $ACTUAL_NPM_VERSION for Trusted Publishing and npm v12 policy."
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Check npmjs.com package version
        id: npmjs-version
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
        run: |
          if npm --registry=https://registry.npmjs.org view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npmjs.com; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published on npmjs.com yet."
          fi
      - name: Publish (public, with provenance)
        if: steps.npmjs-version.outputs.exists != 'true'
        env:
          DIST_TAG: ${{ needs.gate.outputs.dist_tag }}
        run: npm --registry=https://registry.npmjs.org publish --access public --provenance --tag "$DIST_TAG"
      - name: Verify npmjs.com public visibility
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
        run: |
          set -euo pipefail
          REGISTRY_PATH="$(node -e "process.stdout.write(encodeURIComponent(process.env.PACKAGE_NAME))")"
          URL="https://registry.npmjs.org/${REGISTRY_PATH}"
          for attempt in {1..12}; do
            if curl -fsS "$URL" | node -e '
              let data = "";
              process.stdin.on("data", (chunk) => { data += chunk; });
              process.stdin.on("end", () => {
                const pkg = JSON.parse(data);
                process.exit(pkg.versions && pkg.versions[process.env.PACKAGE_VERSION] ? 0 : 1);
              });
            '; then
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is publicly visible on npmjs.com."
              exit 0
            fi
            echo "npmjs.com visibility check attempt ${attempt}/12 failed; retrying."
            sleep 10
          done
          echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is not publicly visible on npmjs.com."
          exit 1
      - name: Verify npmjs.com published artifact metadata
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
        run: npm --registry=https://registry.npmjs.org run release:verify-registry
    timeout-minutes: 60
  publish-gh-packages:
    name: Publish to GitHub Packages
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Setup Node.js 24 for GitHub Packages
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Select GitHub Packages registry for publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          npmrc="${RUNNER_TEMP}/npm-github-packages.npmrc"
          {
            echo "@lcv-ideas-software:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$npmrc"
          chmod 600 "$npmrc"
          echo "NPM_CONFIG_USERCONFIG=$npmrc" >> "$GITHUB_ENV"
          npm --registry=https://registry.npmjs.org config get @lcv-ideas-software:registry
      # The `--registry` flag only overrides the DEFAULT registry. This
      # package is SCOPED (@lcv-ideas-software/*) and the repo's project
      # `.npmrc` pins `@lcv-ideas-software:registry=https://registry.npmjs.org/`
      # — projectconfig beats the temp userconfig npmrc, so npm resolves
      # the scoped publish target to npmjs.org and fails ENEEDAUTH here
      # (this job only has GITHUB_TOKEN). The scope registry must be
      # overridden on the COMMAND LINE (command-line beats projectconfig).
      - name: Check GitHub Packages version
        id: gh-packages-version
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if npm --registry=https://registry.npmjs.org view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --@lcv-ideas-software:registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on GitHub Packages; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published on GitHub Packages yet."
          fi
      - name: Publish (public, with provenance)
        if: steps.gh-packages-version.outputs.exists != 'true'
        env:
          DIST_TAG: ${{ needs.gate.outputs.dist_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm --registry=https://registry.npmjs.org publish --@lcv-ideas-software:registry=https://npm.pkg.github.com --access public --provenance --tag "$DIST_TAG"
    timeout-minutes: 60
  create-github-release:
    name: Create GitHub Release
    needs: [gate, publish-npmjs, publish-gh-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Create artifact directory
        run: mkdir -p ./artifacts
      - name: Pack artifact
        run: npm --registry=https://registry.npmjs.org pack --pack-destination ./artifacts
      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ needs.gate.outputs.tag }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          DISPLAY_TAG: ${{ needs.gate.outputs.display_tag }}
        run: |
          SEMVER_TAG="v${PACKAGE_VERSION}"
          SEMVER_NO_PREFIX="${PACKAGE_VERSION}"
          DISPLAY_NO_PREFIX="${DISPLAY_TAG#v}"
          TAG_NO_PREFIX="${TAG#v}"
          NOTES=$(awk \
            -v tag="$TAG" \
            -v tag_np="$TAG_NO_PREFIX" \
            -v display="$DISPLAY_TAG" \
            -v display_np="$DISPLAY_NO_PREFIX" \
            -v semver="$SEMVER_TAG" \
            -v semver_np="$SEMVER_NO_PREFIX" '
            function matches_heading(key, prefix, next_char) {
              prefix = "## [" key "]"
              if (index($0, prefix) != 1) return 0
              next_char = substr($0, length(prefix) + 1, 1)
              return next_char == "" || next_char == " "
            }
            matches_heading(tag) || matches_heading(tag_np) ||
            matches_heading(display) || matches_heading(display_np) ||
            matches_heading(semver) || matches_heading(semver_np) { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG. See CHANGELOG.md for details."
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create or update release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gate.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping create."
            exit 0
          fi
          gh release create "$TAG" artifacts/*.tgz \
            --repo "$GITHUB_REPOSITORY" \
            --title "cross-review $TAG" \
            --notes "$NOTES" \
            --latest
    timeout-minutes: 60
