name: Publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false
env:
  # Pin the npm release toolchain so the gate exercises npm v12 install-time defaults.
  NPM_CLI_VERSION: "12.0.1"
  NPM_CLI_SHA512: "2f94fd8bf600416416a934bfc59c4991e8bff7372ef7d842784e2a8b8d48c81555ee645069ddea73625fb8e92dc261feab0188fd5dab6c22fefd46316f5f9140"
jobs:
  gate:
    name: Pre-publish gate (test + metadata)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: read
    outputs:
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.hardgate.outputs.sha }}
      display_tag: ${{ steps.meta.outputs.display_tag }}
      dist_tag: ${{ steps.meta.outputs.dist_tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Validate publish ref
        env:
          PUBLISH_REF: ${{ github.ref_name }}
          PUBLISH_EVENT_REF: ${{ github.ref }}
          PUBLISH_REF_TYPE: ${{ github.ref_type }}
          PUBLISH_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          if [ "$PUBLISH_REF_TYPE" != "tag" ]; then
            echo "::error::Publish must be triggered on a tag ref, got type '$PUBLISH_REF_TYPE'."
            exit 1
          fi
          if [ "$PUBLISH_EVENT_REF" != "refs/tags/$PUBLISH_REF" ]; then
            echo "::error::Publish event ref '$PUBLISH_EVENT_REF' does not match short tag '$PUBLISH_REF'."
            exit 1
          fi
          if [ "$PUBLISH_REF_PROTECTED" != "true" ]; then
            echo "::error::Publish tag '$PUBLISH_REF' is not protected by a GitHub ruleset or tag protection rule."
            exit 1
          fi
          if [[ ! "$PUBLISH_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Publish ref must be a version tag (for example v02.03.00), got '$PUBLISH_REF'."
            exit 1
          fi
          echo "Validated publish ref: $PUBLISH_REF"
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Verify checked out tag identity
        env:
          PUBLISH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! git show-ref --verify --quiet "refs/tags/$PUBLISH_REF"; then
            echo "::error::Publish ref '$PUBLISH_REF' is not an existing tag."
            exit 1
          fi
          TAG_SHA="$(git rev-parse "refs/tags/$PUBLISH_REF^{commit}")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "::error::Checked out HEAD $HEAD_SHA does not match tag $PUBLISH_REF at $TAG_SHA."
            exit 1
          fi
          echo "Verified tag $PUBLISH_REF at $TAG_SHA."
      - name: Revalidate tag SHA against current main and all required workflows
        id: prerequisite_gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          TAG_SHA="$(git rev-parse "refs/tags/$PUBLISH_REF^{commit}")"
          MAIN_SHA="$(git rev-parse refs/remotes/origin/main)"
          if [ "$TAG_SHA" != "$MAIN_SHA" ]; then
            echo "::error::Tag $PUBLISH_REF points to $TAG_SHA, but current main is $MAIN_SHA."
            exit 1
          fi

          changed_files="$(git diff-tree --no-commit-id --name-only -r "$TAG_SHA")"
          required_workflows=("CI" "CodeQL" "Socket Security")
          scorecard_required=false
          if grep -Eq '^(\.github/workflows/|\.github/dependabot\.yml$|socketsecurity-requirements\.txt$|SECURITY\.md$)' <<<"$changed_files"; then
            required_workflows+=("OpenSSF Scorecard")
            scorecard_required=true
          fi
          if grep -Eq '^(\.github/workflows/pages\.yml$|site/)' <<<"$changed_files"; then
            required_workflows+=("Pages")
          fi

          # Do not trust the workflow that created or supplied the tag. Query
          # every branch-push workflow required by the tagged main commit.
          runs_json="[]"
          for attempt in {1..60}; do
            remote_main_sha="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
            if [ "$remote_main_sha" != "$TAG_SHA" ]; then
              echo "::error::main advanced to ${remote_main_sha:-missing} while the publish gate was waiting; refusing stale tag $PUBLISH_REF."
              exit 1
            fi

            runs_json="$(gh run list --repo "$GITHUB_REPOSITORY" --commit "$TAG_SHA" --event push --limit 100 --json databaseId,workflowName,name,status,conclusion,url)"
            all_ready=true
            for workflow_name in "${required_workflows[@]}"; do
              workflow_state="$(jq -r --arg workflow "$workflow_name" '
                [.[] | select(.workflowName == $workflow)]
                | sort_by(.databaseId)
                | last
                | if . == null then "missing" else "\(.status):\(.conclusion // "")" end
              ' <<<"$runs_json")"
              if [ "$workflow_state" = "completed:success" ]; then
                continue
              fi
              if [[ "$workflow_state" == completed:* ]]; then
                echo "::error::$workflow_name finished as $workflow_state for $TAG_SHA; refusing publication."
                jq -r --arg workflow "$workflow_name" '.[] | select(.workflowName == $workflow) | [.databaseId, .name, .status, .conclusion, .url] | @tsv' <<<"$runs_json"
                exit 1
              fi
              all_ready=false
              echo "Waiting for $workflow_name on $TAG_SHA (state: $workflow_state)."
            done

            if [ "$all_ready" = true ]; then
              echo "All applicable push workflows completed successfully for $TAG_SHA: ${required_workflows[*]}."
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "::error::Not all applicable workflows completed successfully for $TAG_SHA."
              exit 1
            fi
            sleep 5
          done

          # A dependabot.yml push starts four independent ecosystem update
          # jobs. They are not ordinary push workflows, but they are still a
          # required consequence of that release commit.
          if grep -Fxq ".github/dependabot.yml" <<<"$changed_files"; then
            for attempt in {1..60}; do
              remote_main_sha="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
              if [ "$remote_main_sha" != "$TAG_SHA" ]; then
                echo "::error::main advanced to ${remote_main_sha:-missing} while waiting for Dependabot; refusing stale tag $PUBLISH_REF."
                exit 1
              fi
              dependabot_json="$(gh run list --repo "$GITHUB_REPOSITORY" --commit "$TAG_SHA" --limit 100 --json databaseId,workflowName,name,status,conclusion,url --jq '[.[] | select(.workflowName == "Dependabot Updates")]')"
              dependabot_count="$(jq 'length' <<<"$dependabot_json")"
              if [ "$dependabot_count" -ge 4 ] && jq -e 'all(.[]; .status == "completed")' <<<"$dependabot_json" >/dev/null; then
                if ! jq -e 'all(.[]; .conclusion == "success")' <<<"$dependabot_json" >/dev/null; then
                  echo "::error::One or more Dependabot update jobs failed for $TAG_SHA; refusing publication."
                  jq -r '.[] | [.databaseId, .name, .status, .conclusion, .url] | @tsv' <<<"$dependabot_json"
                  exit 1
                fi
                echo "All ${dependabot_count} Dependabot update jobs completed successfully for $TAG_SHA."
                break
              fi
              if [ "$attempt" -eq 60 ]; then
                echo "::error::Dependabot did not produce and complete all four ecosystem jobs for $TAG_SHA."
                exit 1
              fi
              echo "Waiting for four successful Dependabot update jobs on $TAG_SHA (${attempt}/60; observed: ${dependabot_count})."
              sleep 5
            done
          fi

          # A successful CodeQL workflow only proves upload completion. Wait
          # for both configured analyses for this exact SHA, then bracket the
          # moving-main alert query so a mixed security snapshot cannot pass.
          for attempt in {1..12}; do
            remote_main_sha="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
            if [ "$remote_main_sha" != "$TAG_SHA" ]; then
              echo "::error::main advanced to ${remote_main_sha:-missing} while waiting for CodeQL analyses."
              exit 1
            fi
            processed_categories="$(gh api --paginate -H "Accept: application/vnd.github+json" "repos/$GITHUB_REPOSITORY/code-scanning/analyses?ref=refs/heads/main&per_page=100" --jq '.[] | .commit_sha + " " + .category' | grep -F "$TAG_SHA " || true)"
            if grep -Fq "/language:actions" <<<"$processed_categories" && grep -Fq "/language:javascript-typescript" <<<"$processed_categories"; then
              echo "Both CodeQL categories are processed for $TAG_SHA."
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::CodeQL analyses were not visible for both categories on $TAG_SHA."
              exit 1
            fi
            echo "Waiting for processed CodeQL analyses on $TAG_SHA ($attempt/12)."
            sleep 5
          done

          # Scorecard uploads three independent SARIF categories. Its workflow
          # can finish before all of them are processed, so wait for all three
          # categories for this exact release SHA before querying alerts.
          if [ "$scorecard_required" = true ]; then
            for attempt in {1..12}; do
              remote_main_sha="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
              if [ "$remote_main_sha" != "$TAG_SHA" ]; then
                echo "::error::main advanced to ${remote_main_sha:-missing} while waiting for Scorecard SARIF analyses."
                exit 1
              fi
              processed_scorecard_categories="$(gh api --paginate -H "Accept: application/vnd.github+json" "repos/$GITHUB_REPOSITORY/code-scanning/analyses?ref=refs/heads/main&per_page=100" --jq '.[] | .commit_sha + " " + .category' | grep -F "$TAG_SHA " || true)"
              if grep -Fq "supply-chain/local" <<<"$processed_scorecard_categories" && \
                grep -Fq "supply-chain/online-scm" <<<"$processed_scorecard_categories" && \
                grep -Fq "supply-chain/branch-protection" <<<"$processed_scorecard_categories"; then
                echo "All three OpenSSF Scorecard SARIF categories are processed for $TAG_SHA."
                break
              fi
              if [ "$attempt" -eq 12 ]; then
                echo "::error::OpenSSF Scorecard SARIF analyses were not visible for supply-chain/local, supply-chain/online-scm, and supply-chain/branch-protection on $TAG_SHA."
                exit 1
              fi
              echo "Waiting for all three processed OpenSSF Scorecard SARIF categories on $TAG_SHA ($attempt/12)."
              sleep 5
            done
          fi

          alert_main_before="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
          if [ "$alert_main_before" != "$TAG_SHA" ]; then
            echo "::error::main advanced to ${alert_main_before:-missing} before the code-scanning alert query."
            exit 1
          fi
          open_alerts="$(gh api --paginate -H "Accept: application/vnd.github+json" "repos/$GITHUB_REPOSITORY/code-scanning/alerts?state=open&ref=refs/heads/main&per_page=100" --jq '.[].number')"
          alert_main_after="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
          if [ "$alert_main_after" != "$TAG_SHA" ]; then
            echo "::error::main advanced to ${alert_main_after:-missing} during the code-scanning alert query."
            exit 1
          fi
          if [ -n "$open_alerts" ]; then
            echo "::error::Open code-scanning alert(s) block publication: $(echo "$open_alerts" | tr '\n' ' ')"
            exit 1
          fi
          git fetch --force origin "refs/tags/$PUBLISH_REF:refs/tags/$PUBLISH_REF"
          final_tag_sha="$(git rev-parse "refs/tags/$PUBLISH_REF^{commit}")"
          final_main_sha="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
          if [ "$final_tag_sha" != "$TAG_SHA" ] || [ "$final_main_sha" != "$TAG_SHA" ]; then
            echo "::error::Release identity changed while the hard gate was running (tag=$final_tag_sha main=${final_main_sha:-missing}, expected=$TAG_SHA)."
            exit 1
          fi
          echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "Independent release gate passed for $PUBLISH_REF at $TAG_SHA with zero open code-scanning alerts."
      - name: Setup Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Pre-publish gate (format + lint + biome + typecheck)
        run: npm --registry=https://registry.npmjs.org run check
      - name: Verify
        run: npm --registry=https://registry.npmjs.org test
        env:
          CROSS_REVIEW_STUB: "1"
          # v2.4.0 / P1.1 fail-fast: stub activation requires explicit
          # confirmation. The smoke harness is a legitimate stub consumer.
          CROSS_REVIEW_STUB_CONFIRMED: "1"
      - name: Revalidate protected release identity after local validation
        id: hardgate
        env:
          PUBLISH_REF: ${{ github.ref_name }}
          PUBLISH_EVENT_REF: ${{ github.ref }}
          PUBLISH_REF_TYPE: ${{ github.ref_type }}
          PUBLISH_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          if [ "$PUBLISH_REF_TYPE" != "tag" ] || [ "$PUBLISH_EVENT_REF" != "refs/tags/$PUBLISH_REF" ] || [ "$PUBLISH_REF_PROTECTED" != "true" ]; then
            echo "::error::Protected tag trigger identity changed or is invalid after local validation."
            exit 1
          fi
          git fetch --force origin "refs/tags/$PUBLISH_REF:refs/tags/$PUBLISH_REF"
          TAG_SHA="$(git rev-parse "refs/tags/$PUBLISH_REF^{commit}")"
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
          if [ "$TAG_SHA" != "$CHECKED_OUT_SHA" ] || [ "$TAG_SHA" != "$MAIN_SHA" ]; then
            echo "::error::Release identity changed after local validation (tag=$TAG_SHA checkout=$CHECKED_OUT_SHA main=${MAIN_SHA:-missing})."
            exit 1
          fi
          echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "Protected release identity remains $PUBLISH_REF at $TAG_SHA."
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          DISPLAY_TAG="$(echo "${VERSION%%-*}" | awk -F. '{ printf "v%02d.%02d.%02d", $1, $2, $3 }')"
          if [[ "$VERSION" == *-* ]]; then
            DISPLAY_TAG="${DISPLAY_TAG}-${VERSION#*-}"
          fi
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            echo "::error::Release metadata must be resolved from a tag ref, got '$GITHUB_REF'."
            exit 1
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" != "$DISPLAY_TAG" ]; then
            echo "::error::Publish tag '$TAG' does not match package.json version '$VERSION' (expected '$DISPLAY_TAG')."
            exit 1
          fi
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "display_tag=$DISPLAY_TAG" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publish metadata: $NAME@$VERSION -> $TAG ($DIST_TAG)"
    timeout-minutes: 60
  publish-npmjs:
    name: Publish to npmjs.com
    needs: gate
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.gate.outputs.sha }}
          fetch-depth: 0
      - name: Setup Node.js 24 for npmjs
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # npm Trusted Publishing requires npm >=11.5.1.
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@lcv-ideas-software"
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Verify trusted publishing toolchain
        run: |
          set -euo pipefail
          node --version
          ACTUAL_NPM_VERSION="$(npm --registry=https://registry.npmjs.org --version)"
          if [ "$ACTUAL_NPM_VERSION" != "$NPM_CLI_VERSION" ]; then
            echo "::error::Expected npm $NPM_CLI_VERSION, got $ACTUAL_NPM_VERSION."
            exit 1
          fi
          echo "Verified npm $ACTUAL_NPM_VERSION for Trusted Publishing and npm v12 policy."
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Check npmjs.com package version
        id: npmjs-version
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
        run: |
          if npm --registry=https://registry.npmjs.org view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npmjs.com; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published on npmjs.com yet."
          fi
      - name: Revalidate release tag identity before npmjs publication
        env:
          PUBLISH_REF: ${{ needs.gate.outputs.tag }}
          VERIFIED_SHA: ${{ needs.gate.outputs.sha }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/$PUBLISH_REF:refs/tags/$PUBLISH_REF"
          TAG_SHA="$(git rev-parse "refs/tags/$PUBLISH_REF^{commit}")"
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
          if [ "$TAG_SHA" != "$VERIFIED_SHA" ] || [ "$CHECKED_OUT_SHA" != "$VERIFIED_SHA" ] || [ "$MAIN_SHA" != "$VERIFIED_SHA" ]; then
            echo "::error::Release identity no longer names verified commit $VERIFIED_SHA (tag=$TAG_SHA checkout=$CHECKED_OUT_SHA main=${MAIN_SHA:-missing})."
            exit 1
          fi
          echo "Revalidated release tag $PUBLISH_REF at immutable commit $VERIFIED_SHA."
      - name: Publish (public, with provenance)
        if: steps.npmjs-version.outputs.exists != 'true'
        env:
          DIST_TAG: ${{ needs.gate.outputs.dist_tag }}
        run: npm --registry=https://registry.npmjs.org publish --access public --provenance --tag "$DIST_TAG"
      - name: Verify npmjs.com public visibility
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            published_version="$(npm --registry=https://registry.npmjs.org view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)"
            if [ "$published_version" = "$PACKAGE_VERSION" ]; then
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is publicly visible on npmjs.com."
              exit 0
            fi
            echo "npmjs.com visibility check attempt ${attempt}/12 failed; retrying."
            sleep 10
          done
          echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is not publicly visible on npmjs.com."
          exit 1
      - name: Verify npmjs.com published artifact metadata
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          EXPECTED_GIT_SHA: ${{ needs.gate.outputs.sha }}
          EXPECTED_GIT_TAG: refs/tags/${{ needs.gate.outputs.tag }}
          EXPECTED_GIT_REPOSITORY: https://github.com/LCV-Ideas-Software/cross-review
          EXPECTED_GITHUB_WORKFLOW_PATH: .github/workflows/publish.yml
        run: npm --registry=https://registry.npmjs.org run release:verify-registry
      - name: Cryptographically audit npm registry signatures and provenance
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
        run: |
          set -euo pipefail
          audit_root="$(mktemp -d)"
          trap 'rm -rf "$audit_root"' EXIT
          for attempt in {1..12}; do
            audit_dir="$(mktemp -d "$audit_root/attempt.XXXXXX")"
            if ! npm --registry=https://registry.npmjs.org view "${PACKAGE_NAME}@${PACKAGE_VERSION}" --json > "$audit_dir/registry-metadata.json"; then
              echo "Registry metadata is not available yet for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
            elif ! node "$GITHUB_WORKSPACE/scripts/create-signature-audit-lock.mjs" \
              --source-package-json "$GITHUB_WORKSPACE/package.json" \
              --source-package-lock "$GITHUB_WORKSPACE/package-lock.json" \
              --registry-metadata "$audit_dir/registry-metadata.json" \
              --output-directory "$audit_dir" \
              --package-name "$PACKAGE_NAME" \
              --package-version "$PACKAGE_VERSION"; then
              echo "::error::Published package metadata cannot produce a cryptographically pinned signature-audit lock."
              exit 1
            elif (
              cd "$audit_dir"
              npm --registry=https://registry.npmjs.org ci --omit=dev --ignore-scripts --no-audit --no-fund --allow-git=none --allow-remote=none
              node "$GITHUB_WORKSPACE/scripts/verify-published-package-runtime-contract.mjs" \
                --expected "$audit_dir/published-package-runtime-contract.json" \
                --installed "$audit_dir/node_modules/${PACKAGE_NAME}/package.json"
              npm --registry=https://registry.npmjs.org audit signatures
            ); then
              echo "Registry signatures and provenance verified for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Registry signature/provenance audit failed for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              exit 1
            fi
            echo "Signature/provenance audit attempt ${attempt}/12 failed; retrying after registry propagation."
            sleep 10
          done
    timeout-minutes: 60
  publish-gh-packages:
    name: Publish to GitHub Packages
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.gate.outputs.sha }}
          fetch-depth: 0
      - name: Setup Node.js 24 for GitHub Packages
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Select GitHub Packages registry for publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          npmrc="${RUNNER_TEMP}/npm-github-packages.npmrc"
          {
            echo "@lcv-ideas-software:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$npmrc"
          chmod 600 "$npmrc"
          echo "NPM_CONFIG_USERCONFIG=$npmrc" >> "$GITHUB_ENV"
          npm --registry=https://registry.npmjs.org config get @lcv-ideas-software:registry
      # The `--registry` flag only overrides the DEFAULT registry. This
      # package is SCOPED (@lcv-ideas-software/*) and the repo's project
      # `.npmrc` pins `@lcv-ideas-software:registry=https://registry.npmjs.org/`
      # — projectconfig beats the temp userconfig npmrc, so npm resolves
      # the scoped publish target to npmjs.org and fails ENEEDAUTH here
      # (this job only has GITHUB_TOKEN). The scope registry must be
      # overridden on the COMMAND LINE (command-line beats projectconfig).
      - name: Check GitHub Packages version
        id: gh-packages-version
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if npm --registry=https://registry.npmjs.org view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --@lcv-ideas-software:registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on GitHub Packages; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published on GitHub Packages yet."
          fi
      - name: Revalidate release tag identity before GitHub Packages publication
        env:
          PUBLISH_REF: ${{ needs.gate.outputs.tag }}
          VERIFIED_SHA: ${{ needs.gate.outputs.sha }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/$PUBLISH_REF:refs/tags/$PUBLISH_REF"
          TAG_SHA="$(git rev-parse "refs/tags/$PUBLISH_REF^{commit}")"
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
          if [ "$TAG_SHA" != "$VERIFIED_SHA" ] || [ "$CHECKED_OUT_SHA" != "$VERIFIED_SHA" ] || [ "$MAIN_SHA" != "$VERIFIED_SHA" ]; then
            echo "::error::Release identity no longer names verified commit $VERIFIED_SHA (tag=$TAG_SHA checkout=$CHECKED_OUT_SHA main=${MAIN_SHA:-missing})."
            exit 1
          fi
          echo "Revalidated release tag $PUBLISH_REF at immutable commit $VERIFIED_SHA."
      - name: Publish (public, with provenance)
        if: steps.gh-packages-version.outputs.exists != 'true'
        env:
          DIST_TAG: ${{ needs.gate.outputs.dist_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm --registry=https://registry.npmjs.org publish --@lcv-ideas-software:registry=https://npm.pkg.github.com --access public --provenance --tag "$DIST_TAG"
    timeout-minutes: 60
  create-github-release:
    name: Create GitHub Release
    needs: [gate, publish-npmjs, publish-gh-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.gate.outputs.sha }}
          fetch-depth: 0
      - name: Setup Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Create artifact directory
        run: mkdir -p ./artifacts
      - name: Pack artifact
        run: npm --registry=https://registry.npmjs.org pack --pack-destination ./artifacts
      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ needs.gate.outputs.tag }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          DISPLAY_TAG: ${{ needs.gate.outputs.display_tag }}
        run: |
          SEMVER_TAG="v${PACKAGE_VERSION}"
          SEMVER_NO_PREFIX="${PACKAGE_VERSION}"
          DISPLAY_NO_PREFIX="${DISPLAY_TAG#v}"
          TAG_NO_PREFIX="${TAG#v}"
          NOTES=$(awk \
            -v tag="$TAG" \
            -v tag_np="$TAG_NO_PREFIX" \
            -v display="$DISPLAY_TAG" \
            -v display_np="$DISPLAY_NO_PREFIX" \
            -v semver="$SEMVER_TAG" \
            -v semver_np="$SEMVER_NO_PREFIX" '
            function matches_heading(key, prefix, next_char) {
              prefix = "## [" key "]"
              if (index($0, prefix) != 1) return 0
              next_char = substr($0, length(prefix) + 1, 1)
              return next_char == "" || next_char == " "
            }
            matches_heading(tag) || matches_heading(tag_np) ||
            matches_heading(display) || matches_heading(display_np) ||
            matches_heading(semver) || matches_heading(semver_np) { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG. See CHANGELOG.md for details."
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Revalidate release tag identity before creating GitHub Release
        env:
          PUBLISH_REF: ${{ needs.gate.outputs.tag }}
          VERIFIED_SHA: ${{ needs.gate.outputs.sha }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/$PUBLISH_REF:refs/tags/$PUBLISH_REF"
          TAG_SHA="$(git rev-parse "refs/tags/$PUBLISH_REF^{commit}")"
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git ls-remote --heads origin "refs/heads/main" | awk '{print $1}')"
          if [ "$TAG_SHA" != "$VERIFIED_SHA" ] || [ "$CHECKED_OUT_SHA" != "$VERIFIED_SHA" ] || [ "$MAIN_SHA" != "$VERIFIED_SHA" ]; then
            echo "::error::Release identity no longer names verified commit $VERIFIED_SHA (tag=$TAG_SHA checkout=$CHECKED_OUT_SHA main=${MAIN_SHA:-missing})."
            exit 1
          fi
          echo "Revalidated release tag $PUBLISH_REF at immutable commit $VERIFIED_SHA."
      - name: Create or update release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gate.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping create."
            exit 0
          fi
          gh release create "$TAG" artifacts/*.tgz \
            --repo "$GITHUB_REPOSITORY" \
            --title "cross-review $TAG" \
            --notes "$NOTES" \
            --latest
    timeout-minutes: 60
