            if package_view="$(npm --registry=https://registry.npmjs.org view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version dist.integrity --json 2>/dev/null)"; then
              normalized_view="$(jq -ce 'if type == "array" and length == 1 then .[0] else . end' <<<"$package_view")"
              published_version="$(jq -er '.version' <<<"$normalized_view")"
              published_integrity="$(jq -er '.["dist.integrity"]' <<<"$normalized_view")"
              if [ "$published_version" != "$PACKAGE_VERSION" ]; then
                echo "::error::npmjs.com exposed version $published_version for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
                exit 1
              fi
              node scripts/release-policy.mjs verify-sri \
                "$PACKAGE_INTEGRITY" "$published_integrity" \
                "npmjs.com ${PACKAGE_NAME}@${PACKAGE_VERSION}"
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is publicly visible with the exact SRI."
              exit 0
            fi
            echo "npmjs.com visibility check attempt ${attempt}/12 failed; retrying."
            sleep 10
          done
          echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is not publicly visible on npmjs.com."
          exit 1
      - name: Verify npmjs.com latest remained monotonic
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          PRIOR_LATEST: ${{ steps.npmjs-tag.outputs.prior_latest }}
          PUBLISH_TAG: ${{ steps.npmjs-tag.outputs.publish_tag }}
        run: |
          set -euo pipefail
          tags_view="$(npm --registry=https://registry.npmjs.org view "$PACKAGE_NAME" dist-tags --json)"
          normalized_tags="$(jq -ce 'if type == "array" and length == 1 then .[0] else . end' <<<"$tags_view")"
          ACTUAL_LATEST="$(jq -er 'if type == "object" then (.latest // "") else error("unexpected dist-tags response") end' <<<"$normalized_tags")"
          node scripts/release-policy.mjs assert-registry-latest \
            "$PACKAGE_VERSION" "$PRIOR_LATEST" "$ACTUAL_LATEST" "$PUBLISH_TAG"
          echo "npmjs.com latest is monotonic at ${ACTUAL_LATEST:-missing}; candidate was $PACKAGE_VERSION."
      - name: Verify npmjs.com published artifact metadata
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          EXPECTED_GIT_SHA: ${{ needs.gate.outputs.sha }}
          EXPECTED_GIT_TAG: refs/tags/${{ needs.gate.outputs.tag }}
          EXPECTED_GIT_REPOSITORY: https://github.com/LCV-Ideas-Software/cross-review
          EXPECTED_GITHUB_WORKFLOW_PATH: .github/workflows/publish.yml
        run: npm --registry=https://registry.npmjs.org run release:verify-registry
      - name: Cryptographically audit npm registry signatures and provenance
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
        run: |
          set -euo pipefail
          audit_root="$(mktemp -d)"
          trap 'rm -rf "$audit_root"' EXIT
          for attempt in {1..12}; do
            audit_dir="$(mktemp -d "$audit_root/attempt.XXXXXX")"
            if ! npm --registry=https://registry.npmjs.org view "${PACKAGE_NAME}@${PACKAGE_VERSION}" --json > "$audit_dir/registry-metadata.json"; then
              echo "Registry metadata is not available yet for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
            elif ! node "$GITHUB_WORKSPACE/scripts/create-signature-audit-lock.mjs" \
              --source-package-json "$GITHUB_WORKSPACE/package.json" \
              --source-package-lock "$GITHUB_WORKSPACE/package-lock.json" \
              --registry-metadata "$audit_dir/registry-metadata.json" \
              --output-directory "$audit_dir" \
              --package-name "$PACKAGE_NAME" \
              --package-version "$PACKAGE_VERSION"; then
              echo "::error::Published package metadata cannot produce a cryptographically pinned signature-audit lock."
              exit 1
            elif (
              cd "$audit_dir"
              npm --registry=https://registry.npmjs.org ci --omit=dev --ignore-scripts --no-audit --no-fund --allow-git=none --allow-remote=none
              node "$GITHUB_WORKSPACE/scripts/verify-published-package-runtime-contract.mjs" \
                --expected "$audit_dir/published-package-runtime-contract.json" \
                --installed "$audit_dir/node_modules/${PACKAGE_NAME}/package.json"
              npm --registry=https://registry.npmjs.org audit signatures
            ); then
              echo "Registry signatures and provenance verified for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Registry signature/provenance audit failed for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              exit 1
            fi
            echo "Signature/provenance audit attempt ${attempt}/12 failed; retrying after registry propagation."
            sleep 10
          done
    timeout-minutes: 60
