          node scripts/release-policy.mjs verify-file-sri "artifacts/$PACKAGE_TARBALL" "$PACKAGE_INTEGRITY"
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ needs.gate.outputs.tag }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          DISPLAY_TAG: ${{ needs.gate.outputs.display_tag }}
        run: |
          set -euo pipefail
          SEMVER_TAG="v${PACKAGE_VERSION}"
          SEMVER_NO_PREFIX="${PACKAGE_VERSION}"
          DISPLAY_NO_PREFIX="${DISPLAY_TAG#v}"
          TAG_NO_PREFIX="${TAG#v}"
          NOTES="$(awk \
            -v tag="$TAG" \
            -v tag_np="$TAG_NO_PREFIX" \
            -v display="$DISPLAY_TAG" \
            -v display_np="$DISPLAY_NO_PREFIX" \
            -v semver="$SEMVER_TAG" \
            -v semver_np="$SEMVER_NO_PREFIX" '
            function matches_heading(key, prefix, next_char) {
              prefix = "## [" key "]"
              if (index($0, prefix) != 1) return 0
              next_char = substr($0, length(prefix) + 1, 1)
              return next_char == "" || next_char == " "
            }
            matches_heading(tag) || matches_heading(tag_np) ||
            matches_heading(display) || matches_heading(display_np) ||
            matches_heading(semver) || matches_heading(semver_np) { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)"
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG. See CHANGELOG.md for details."
          fi
          printf '%s\n' "$NOTES" > release-notes.md
      - name: Revalidate release tag identity before reconciling GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMMUTABILITY_TOKEN: ${{ secrets.LCV_AUTOMATION_TOKEN }}
          TAG: ${{ needs.gate.outputs.tag }}
          VERIFIED_SHA: ${{ needs.gate.outputs.sha }}
          PUBLISH_EVENT_REF: ${{ github.ref }}
          PUBLISH_REF_TYPE: ${{ github.ref_type }}
          PUBLISH_REF_PROTECTED: ${{ github.ref_protected }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          PRERELEASE: ${{ needs.gate.outputs.prerelease }}
          PACKAGE_TARBALL: ${{ needs.gate.outputs.package_tarball }}
          PACKAGE_SHA256: ${{ needs.gate.outputs.package_sha256 }}
        run: |
          set -euo pipefail
          github_token="$GH_TOKEN"
          immutability_token="$IMMUTABILITY_TOKEN"
          unset GH_TOKEN
          unset IMMUTABILITY_TOKEN
          if [ -z "$github_token" ]; then
            echo "::error::GITHUB_TOKEN is required for release reconciliation."
            exit 1
          fi
          if [ -z "$immutability_token" ]; then
            echo "::error::LCV_AUTOMATION_TOKEN is required for immutable-release verification."
            exit 1
          fi
          github_api() {
            GH_TOKEN="$github_token" gh api "$@"
          }
          github_release() {
            GH_TOKEN="$github_token" gh release "$@"
          }
          if [ "$PUBLISH_REF_TYPE" != "tag" ] || [ "$PUBLISH_EVENT_REF" != "refs/tags/$TAG" ] || [ "$PUBLISH_REF_PROTECTED" != "true" ]; then
            echo "::error::Protected tag trigger identity is no longer valid."
            exit 1
          fi
          ref_json="$(github_api --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG")"
          object_type="$(jq -er '.object.type' <<<"$ref_json")"
          TAG_SHA="$(jq -er '.object.sha' <<<"$ref_json")"
          for _ in {1..10}; do
            if [ "$object_type" = "commit" ]; then
              break
            fi
            if [ "$object_type" != "tag" ]; then
              echo "::error::Tag $TAG resolves to unsupported Git object type '$object_type'."
              exit 1
            fi
            tag_json="$(github_api --method GET "repos/$GITHUB_REPOSITORY/git/tags/$TAG_SHA")"
            object_type="$(jq -er '.object.type' <<<"$tag_json")"
            TAG_SHA="$(jq -er '.object.sha' <<<"$tag_json")"
          done
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(github_api --method GET "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          relation="$(github_api --method GET "repos/$GITHUB_REPOSITORY/compare/${VERIFIED_SHA}...${MAIN_SHA}" --jq '.status')"
          if [ "$TAG_SHA" != "$VERIFIED_SHA" ] || [ "$CHECKED_OUT_SHA" != "$VERIFIED_SHA" ]; then
            echo "::error::Release tag or checkout no longer names verified commit $VERIFIED_SHA (tag=$TAG_SHA checkout=$CHECKED_OUT_SHA)."
            exit 1
          fi
          if [ "$relation" != "ahead" ] && [ "$relation" != "identical" ]; then
            echo "::error::Release identity no longer names a verified commit in live main history (verified=$VERIFIED_SHA tag=$TAG_SHA checkout=$CHECKED_OUT_SHA main=$MAIN_SHA relation=$relation)."
            exit 1
          fi
          echo "Revalidated release tag $TAG at immutable commit $VERIFIED_SHA."

          read_latest_release_tag() {
            local latest_json latest_error
            latest_error="$RUNNER_TEMP/latest-release-${GITHUB_RUN_ID}.err"
            if latest_json="$(github_api --method GET "repos/$GITHUB_REPOSITORY/releases/latest" 2>"$latest_error")"; then
              jq -er '.tag_name' <<<"$latest_json"
              return
            fi
            if grep -q 'HTTP 404' "$latest_error"; then
              printf ''
              return
            fi
            cat "$latest_error" >&2
            echo "::error::Could not determine the current GitHub latest release." >&2
            return 1
          }

          resolve_api_ref_to_commit() {
            local ref_path="$1"
            local ref_json ref_error object_type object_sha tag_json
            ref_json="$RUNNER_TEMP/ref-${GITHUB_RUN_ID}-${RANDOM}.json"
            ref_error="$RUNNER_TEMP/ref-${GITHUB_RUN_ID}-${RANDOM}.err"
            if ! github_api --method GET "repos/$GITHUB_REPOSITORY/git/ref/$ref_path" >"$ref_json" 2>"$ref_error"; then
              if grep -q 'HTTP 404' "$ref_error"; then
                return 2
              fi
              cat "$ref_error" >&2
              echo "::error::Could not resolve authenticated Git reference '$ref_path'." >&2
              return 1
            fi
            object_type="$(jq -er '.object.type' "$ref_json")"
            object_sha="$(jq -er '.object.sha' "$ref_json")"
            for _ in {1..8}; do
              if [ "$object_type" = "commit" ]; then
                printf '%s' "$object_sha"
                return
              fi
              if [ "$object_type" != "tag" ]; then
                echo "::error::Git reference '$ref_path' resolves to unsupported object type '$object_type'." >&2
                return 1
              fi
              tag_json="$(github_api --method GET "repos/$GITHUB_REPOSITORY/git/tags/$object_sha")"
              object_type="$(jq -er '.object.type' <<<"$tag_json")"
              object_sha="$(jq -er '.object.sha' <<<"$tag_json")"
            done
            echo "::error::Git reference '$ref_path' exceeded the annotated-tag dereference limit." >&2
            return 1
          }

          PRIOR_LATEST_TAG="$(read_latest_release_tag)"
          PROMOTE_LATEST="$(node scripts/release-policy.mjs github-latest \
            "$PACKAGE_VERSION" "$PRIOR_LATEST_TAG")"
          echo "GitHub latest decision: candidate=$PACKAGE_VERSION prior=${PRIOR_LATEST_TAG:-missing} promote=$PROMOTE_LATEST."

          release_json="$RUNNER_TEMP/release-${GITHUB_RUN_ID}.json"
          expected_title="cross-review $TAG"
          expected_body="$(cat release-notes.md)"

          assert_immutable_release_policy() {
            local phase="$1" policy_json policy_error policy_enabled policy_enforced
            if [ -z "$immutability_token" ]; then
              echo "::error::LCV_AUTOMATION_TOKEN is required to read the administrative immutable-release policy before $phase."
              exit 1
            fi
            policy_error="$RUNNER_TEMP/immutable-release-policy-${phase}-${GITHUB_RUN_ID}.err"
            if ! policy_json="$(GH_TOKEN="$immutability_token" gh api --method GET \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/${GITHUB_REPOSITORY}/immutable-releases" 2>"$policy_error")"; then
              cat "$policy_error" >&2
              echo "::error::Could not prove that immutable releases are administratively enforced before $phase."
              exit 1
            fi
            policy_enabled="$(jq -er '
              if has("enabled") and ((.enabled | type) == "boolean")
              then (.enabled | tostring)
              else error("missing or invalid enabled state")
              end
            ' <<<"$policy_json")"
            policy_enforced="$(jq -er '
              if has("enforced_by_owner") and ((.enforced_by_owner | type) == "boolean")
              then (.enforced_by_owner | tostring)
              else error("missing or invalid owner enforcement state")
              end
            ' <<<"$policy_json")"
            if [ "$policy_enabled" != "true" ] || [ "$policy_enforced" != "true" ]; then
              echo "::error::Immutable releases are not owner-enforced before $phase (enabled=$policy_enabled enforced_by_owner=$policy_enforced)."
              exit 1
            fi
            echo "Immutable-release policy is owner-enforced before $phase."
          }

          load_release() {
            local release_pages matching_releases matching_count
            if ! release_pages="$(github_api --method GET --paginate --slurp \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100")"; then
              echo "::error::Could not list GitHub Releases, including drafts, for $TAG." >&2
              return 3
            fi
            if ! matching_releases="$(jq -ce --arg tag "$TAG" \
              '[.[][] | select(.tag_name == $tag)]' \
              <<<"$release_pages")"; then
              echo "::error::Could not parse the paginated GitHub Releases response." >&2
              return 3
            fi
            matching_count="$(jq -er 'length' <<<"$matching_releases")" || return 3
            if [ "$matching_count" -gt 1 ]; then
              echo "::error::Found $matching_count releases for exact tag $TAG; refusing ambiguous reconciliation." >&2
              return 2
            fi
            if [ "$matching_count" -eq 0 ]; then
              printf 'null\n' >"$release_json"
              return 1
            fi
            jq -e '.[0]' <<<"$matching_releases" >"$release_json"
          }

          assert_loaded_release_identity() {
            local expected_id="$1" require_final="$2"
            local current_title current_body current_draft current_prerelease
            node scripts/release-policy.mjs assert-existing-tag-release \
              "$release_json" "$expected_id" "$TAG"
            current_title="$(jq -r '.name // ""' "$release_json")"
            current_body="$(jq -r '.body // ""' "$release_json")"
            current_draft="$(jq -er '.draft' "$release_json")"
            current_prerelease="$(jq -er '.prerelease' "$release_json")"
            if [ "$require_final" = "true" ] && \
              { [ "$current_title" != "$expected_title" ] || \
                [ "$current_body" != "$expected_body" ] || \
                [ "$current_draft" != "false" ] || \
                [ "$current_prerelease" != "$PRERELEASE" ]; }; then
              echo "::error::Published release metadata did not converge (title='$current_title' draft=$current_draft prerelease=$current_prerelease)."
              exit 1
            fi
            LOADED_RELEASE_DRAFT="$current_draft"
          }

          require_single_asset() {
            local matching_assets unexpected_assets
            matching_assets="$(jq --arg name "$PACKAGE_TARBALL" \
              '[.assets[]? | select(.name == $name)] | length' "$release_json")"
            unexpected_assets="$(jq --arg name "$PACKAGE_TARBALL" \
              '[.assets[]? | select(.name != $name)] | length' "$release_json")"
            if [ "$matching_assets" -ne 1 ] || [ "$unexpected_assets" -ne 0 ]; then
              echo "::error::Release $TAG must contain exactly one $PACKAGE_TARBALL asset (matching=$matching_assets unexpected=$unexpected_assets)."
              exit 1
            fi
            LOADED_ASSET_ID="$(jq -er --arg name "$PACKAGE_TARBALL" \
              '.assets[] | select(.name == $name) | .id' "$release_json")"
            LOADED_ASSET_STATE="$(jq -er --arg name "$PACKAGE_TARBALL" \
              '.assets[] | select(.name == $name) | .state' "$release_json")"
            LOADED_ASSET_DIGEST="$(jq -r --arg name "$PACKAGE_TARBALL" \
              '.assets[] | select(.name == $name) | (.digest // "")' "$release_json")"
            if [ "$LOADED_ASSET_STATE" != "uploaded" ]; then
              echo "::error::Release asset $PACKAGE_TARBALL is in state '$LOADED_ASSET_STATE', expected 'uploaded'."
              exit 1
            fi
            if [ -n "$LOADED_ASSET_DIGEST" ] && \
              [ "$LOADED_ASSET_DIGEST" != "sha256:$PACKAGE_SHA256" ]; then
              echo "::error::Release asset digest mismatch (expected sha256:$PACKAGE_SHA256, found $LOADED_ASSET_DIGEST)."
              exit 1
            fi
          }

          verify_asset_bytes() {
            local asset_id="$1" phase="$2" asset_dir
            asset_dir="$(mktemp -d "${RUNNER_TEMP}/${phase}.XXXXXX")"
            github_api --method GET \
              -H "Accept: application/octet-stream" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" \
              >"$asset_dir/$PACKAGE_TARBALL"
            echo "$PACKAGE_SHA256  $asset_dir/$PACKAGE_TARBALL" | sha256sum --check --strict
          }

          assert_live_release_ref() {
            local current_tag_sha current_main_sha current_relation
            current_tag_sha="$(resolve_api_ref_to_commit "tags/$TAG")"
            current_main_sha="$(github_api --method GET \
              "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
            current_relation="$(github_api --method GET \
              "repos/$GITHUB_REPOSITORY/compare/${VERIFIED_SHA}...${current_main_sha}" --jq '.status')"
            if [ "$current_tag_sha" != "$VERIFIED_SHA" ] || \
              { [ "$current_relation" != "ahead" ] && [ "$current_relation" != "identical" ]; }; then
              echo "::error::Release identity changed (tag=$current_tag_sha main=$current_main_sha relation=$current_relation expected=$VERIFIED_SHA)."
              exit 1
            fi
          }

          # This administrative read uses a step-scoped token because
          # GITHUB_TOKEN write-all does not grant Administration: read.
          # Nothing is created or uploaded unless owner enforcement is proven.
          assert_immutable_release_policy "release-reconciliation"

          load_status=0
          load_release || load_status=$?
          if [ "$load_status" -eq 1 ]; then
            create_payload="$RUNNER_TEMP/create-release-${GITHUB_RUN_ID}.json"
            created_release="$RUNNER_TEMP/created-release-${GITHUB_RUN_ID}.json"
            jq -n \
              --arg tag "$TAG" \
              --arg target "$VERIFIED_SHA" \
              --arg name "$expected_title" \
              --arg body "$expected_body" \
              --argjson prerelease "$PRERELEASE" \
              '{tag_name: $tag, target_commitish: $target, name: $name, body: $body,
                draft: true, prerelease: $prerelease}' \
              >"$create_payload"
            github_api --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/${GITHUB_REPOSITORY}/releases" \
              --input "$create_payload" >"$created_release"
            created_release_id="$(jq -er '.id' "$created_release")"
            load_release
            listed_release_id="$(jq -er '.id' "$release_json")"
            if [ "$listed_release_id" != "$created_release_id" ]; then
              echo "::error::Created release id $created_release_id but discovery returned $listed_release_id."
              exit 1
            fi
            echo "Created recoverable draft release $TAG as id $created_release_id."
          elif [ "$load_status" -ne 0 ]; then
            exit "$load_status"
          fi

          release_id="$(jq -er '.id' "$release_json")"
          assert_loaded_release_identity "$release_id" false
          matching_assets="$(jq --arg name "$PACKAGE_TARBALL" \
            '[.assets[]? | select(.name == $name)] | length' "$release_json")"
          unexpected_assets="$(jq --arg name "$PACKAGE_TARBALL" \
            '[.assets[]? | select(.name != $name)] | length' "$release_json")"
          if [ "$matching_assets" -gt 1 ] || [ "$unexpected_assets" -gt 0 ]; then
            echo "::error::Release $TAG has an ambiguous asset set (matching=$matching_assets unexpected=$unexpected_assets)."
            exit 1
          fi
          if [ "$matching_assets" -eq 0 ]; then
            if [ "$LOADED_RELEASE_DRAFT" != "true" ]; then
              echo "::error::Published release $TAG is missing immutable asset $PACKAGE_TARBALL."
              exit 1
            fi
            encoded_asset_name="$(jq -rn --arg name "$PACKAGE_TARBALL" '$name | @uri')"
            upload_json="$RUNNER_TEMP/upload-release-asset-${GITHUB_RUN_ID}.json"
            curl --fail-with-body --silent --show-error \
              --request POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $github_token" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@artifacts/$PACKAGE_TARBALL" \
              --output "$upload_json" \
              "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?name=${encoded_asset_name}"
            uploaded_asset_id="$(jq -er --arg name "$PACKAGE_TARBALL" \
              'select(.name == $name and .state == "uploaded") | .id' "$upload_json")"
            load_release
            assert_loaded_release_identity "$release_id" false
            require_single_asset
            if [ "$LOADED_ASSET_ID" != "$uploaded_asset_id" ]; then
              echo "::error::Uploaded asset id $uploaded_asset_id but discovery returned $LOADED_ASSET_ID."
              exit 1
            fi
          else
            require_single_asset
          fi

          asset_id="$LOADED_ASSET_ID"
          verify_asset_bytes "$asset_id" "prepublish-release-asset"

          # Close the discovery/upload TOCTOU window immediately before the
          # externally visible transition. Any identity or asset replacement
          # blocks publication; nothing is deleted or overwritten.
          load_release
          assert_loaded_release_identity "$release_id" false
          require_single_asset
          if [ "$LOADED_ASSET_ID" != "$asset_id" ]; then
            echo "::error::Release asset id changed from $asset_id to $LOADED_ASSET_ID before publication."
            exit 1
          fi
          verify_asset_bytes "$asset_id" "prepatch-release-asset"
          assert_live_release_ref

          LATEST_DECISION_BASE="$(read_latest_release_tag)"
          PROMOTE_LATEST="$(node scripts/release-policy.mjs github-latest \
            "$PACKAGE_VERSION" "$LATEST_DECISION_BASE")"
          assert_immutable_release_policy "release-patch"

          if [ "$LOADED_RELEASE_DRAFT" = "true" ]; then
            # Protected release fields are writable only while this is a
            # draft. One exact PATCH makes the fully assembled release public.
            publish_payload="$RUNNER_TEMP/publish-release-${GITHUB_RUN_ID}.json"
            patched_release="$RUNNER_TEMP/patched-release-${GITHUB_RUN_ID}.json"
            jq -n \
              --arg tag "$TAG" \
              --arg target "$VERIFIED_SHA" \
              --arg name "$expected_title" \
              --arg body "$expected_body" \
              --argjson prerelease "$PRERELEASE" \
              --arg make_latest "$PROMOTE_LATEST" \
              '{tag_name: $tag, target_commitish: $target, name: $name, body: $body,
                draft: false, prerelease: $prerelease, make_latest: $make_latest}' \
              >"$publish_payload"
            github_api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              --input "$publish_payload" >"$patched_release"
            if [ "$(jq -er '.id' "$patched_release")" != "$release_id" ]; then
              echo "::error::Release publication PATCH returned an unexpected release identity."
              exit 1
            fi
          else
            # GitHub documents only title and release notes as editable after
            # an immutable release is published. Never resend tag, target,
            # draft, prerelease, or make_latest during idempotent recovery.
            published_immutable="$(jq -er '
              if has("immutable") and ((.immutable | type) == "boolean")
              then (.immutable | tostring)
              else error("missing or invalid immutable release state")
              end
            ' "$release_json")"
            published_prerelease="$(jq -er '.prerelease' "$release_json")"
            if [ "$published_immutable" != "true" ]; then
              echo "::error::Existing public release $TAG is not immutable; refusing an undocumented reconciliation mutation."
              exit 1
            fi
            if [ "$published_prerelease" != "$PRERELEASE" ]; then
              echo "::error::Immutable release $TAG has prerelease=$published_prerelease, expected $PRERELEASE; this protected field cannot be repaired."
              exit 1
            fi

            published_title="$(jq -r '.name // ""' "$release_json")"
            published_body="$(jq -r '.body // ""' "$release_json")"
            if [ "$published_title" != "$expected_title" ] || [ "$published_body" != "$expected_body" ]; then
              metadata_payload="$RUNNER_TEMP/release-metadata-${GITHUB_RUN_ID}.json"
              patched_release="$RUNNER_TEMP/patched-release-${GITHUB_RUN_ID}.json"
              jq -n --arg name "$expected_title" --arg body "$expected_body" \
                '{name: $name, body: $body}' >"$metadata_payload"
              github_api --method PATCH \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                --input "$metadata_payload" >"$patched_release"
              if [ "$(jq -er '.id' "$patched_release")" != "$release_id" ]; then
                echo "::error::Release metadata PATCH returned an unexpected release identity."
                exit 1
              fi
              echo "Reconciled only the documented editable title/notes for immutable release $TAG."
            else
              echo "Immutable release $TAG already has exact metadata; no release mutation was sent."
            fi
          fi

          # Publishing under GitHub's immutable-release policy also creates a
          # signed release attestation. Wait for that server-side transition;
          # a merely public-but-mutable release must never satisfy this gate.
          release_immutable="false"
          for immutability_attempt in {1..12}; do
            load_release
            assert_loaded_release_identity "$release_id" true
            require_single_asset
            if [ "$LOADED_ASSET_ID" != "$asset_id" ]; then
              echo "::error::Published release asset id changed from $asset_id to $LOADED_ASSET_ID."
              exit 1
            fi
            release_immutable="$(jq -er '
              if has("immutable") and ((.immutable | type) == "boolean")
              then (.immutable | tostring)
              else error("missing or invalid immutable release state")
              end
            ' "$release_json")"
            if [ "$release_immutable" = "true" ]; then
              break
            fi
            if [ "$immutability_attempt" -eq 12 ]; then
              echo "::error::Published release $TAG did not become immutable; refusing a mutable success state."
              exit 1
            fi
            echo "Waiting for immutable release state for $TAG ($immutability_attempt/12)."
            sleep 5
          done
          verify_asset_bytes "$asset_id" "final-release-asset"
          assert_live_release_ref

          release_attestation_output="$RUNNER_TEMP/release-attestation-${GITHUB_RUN_ID}.out"
          release_attestation_error="$RUNNER_TEMP/release-attestation-${GITHUB_RUN_ID}.err"
          asset_attestation_output="$RUNNER_TEMP/release-asset-attestation-${GITHUB_RUN_ID}.out"
          asset_attestation_error="$RUNNER_TEMP/release-asset-attestation-${GITHUB_RUN_ID}.err"
          # gh <=2.92.0 can disclose GH_TOKEN during these verification calls
          # (CVE-2026-48501); fail before networking unless the fix is present.
          GH_CLI_VERSION="$(gh --version | awk 'NR == 1 && $1 == "gh" && $2 == "version" { print $3 }')"
          node scripts/release-policy.mjs assert-safe-gh-release-verifier "$GH_CLI_VERSION"
          echo "Using GitHub CLI $GH_CLI_VERSION for release attestation verification."
          attestation_verified=false
          for attestation_attempt in {1..12}; do
            : >"$release_attestation_output"
            : >"$release_attestation_error"
            : >"$asset_attestation_output"
            : >"$asset_attestation_error"
            if github_release verify "$TAG" --repo "$GITHUB_REPOSITORY" \
              >"$release_attestation_output" 2>"$release_attestation_error" && \
              github_release verify-asset "$TAG" "artifacts/$PACKAGE_TARBALL" \
                --repo "$GITHUB_REPOSITORY" \
                >"$asset_attestation_output" 2>"$asset_attestation_error"; then
              cat "$release_attestation_output"
              cat "$asset_attestation_output"
              attestation_verified=true
              break
            fi
            if [ "$attestation_attempt" -eq 12 ]; then
              cat "$release_attestation_error" >&2
              cat "$asset_attestation_error" >&2
              echo "::error::GitHub did not provide a valid signed release and asset attestation for immutable release $TAG."
              exit 1
            fi
            echo "Waiting for the signed release attestation for $TAG ($attestation_attempt/12)."
            sleep 5
          done
          if [ "$attestation_verified" != "true" ]; then
            echo "::error::Signed release attestation verification did not complete."
            exit 1
          fi

          ACTUAL_LATEST_TAG="$(read_latest_release_tag)"
          node scripts/release-policy.mjs assert-github-latest \
            "$PACKAGE_VERSION" "$PRIOR_LATEST_TAG" "$ACTUAL_LATEST_TAG" "$PROMOTE_LATEST"
          node scripts/release-policy.mjs assert-github-latest \
            "$PACKAGE_VERSION" "$LATEST_DECISION_BASE" "$ACTUAL_LATEST_TAG" "$PROMOTE_LATEST"
          echo "Release $TAG id $release_id is immutable and attested with verified asset id $asset_id (sha256:$PACKAGE_SHA256); GitHub latest remains monotonic at ${ACTUAL_LATEST_TAG:-missing}."
    timeout-minutes: 60
