name: Publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions: write-all
concurrency:
  # One repository-wide release transaction at a time. Per-tag groups would
  # allow two versions to race the monotonic npm/GitHub `latest` decisions.
  group: release-publication
  queue: max
  cancel-in-progress: false
env:
  # Pin the npm release toolchain so the gate exercises npm v12 install-time defaults.
  NPM_CLI_VERSION: "12.0.1"
  NPM_CLI_SHA512: "2f94fd8bf600416416a934bfc59c4991e8bff7372ef7d842784e2a8b8d48c81555ee645069ddea73625fb8e92dc261feab0188fd5dab6c22fefd46316f5f9140"
jobs:
  gate:
    name: Pre-publish gate (test + immutable artifact)
    runs-on: ubuntu-latest
    environment: release-validation
    permissions: write-all
    outputs:
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.hardgate.outputs.sha }}
      display_tag: ${{ steps.meta.outputs.display_tag }}
      dist_tag: ${{ steps.meta.outputs.dist_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      package_tarball: ${{ steps.pack.outputs.tarball }}
      package_sha256: ${{ steps.pack.outputs.sha256 }}
      package_integrity: ${{ steps.pack.outputs.integrity }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Validate publish ref
        env:
          PUBLISH_REF: ${{ github.ref_name }}
          PUBLISH_EVENT_REF: ${{ github.ref }}
          PUBLISH_REF_TYPE: ${{ github.ref_type }}
          PUBLISH_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          if [ "$PUBLISH_REF_TYPE" != "tag" ]; then
            echo "::error::Publish must be triggered on a tag ref, got type '$PUBLISH_REF_TYPE'."
            exit 1
          fi
          if [ "$PUBLISH_EVENT_REF" != "refs/tags/$PUBLISH_REF" ]; then
            echo "::error::Publish event ref '$PUBLISH_EVENT_REF' does not match short tag '$PUBLISH_REF'."
            exit 1
          fi
          if [ "$PUBLISH_REF_PROTECTED" != "true" ]; then
            echo "::error::Publish tag '$PUBLISH_REF' is not protected by a GitHub ruleset or tag protection rule."
            exit 1
          fi
          if [[ ! "$PUBLISH_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Publish ref must be a version tag (for example v02.03.00), got '$PUBLISH_REF'."
            exit 1
          fi
          echo "Validated publish ref: $PUBLISH_REF"
      - name: Require owner-enforced immutable GitHub Releases
        env:
          ADMIN_GH_TOKEN: ${{ secrets.LCV_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$ADMIN_GH_TOKEN" ]; then
            echo "::error::LCV_AUTOMATION_TOKEN is required for the pre-publication immutable-release policy gate."
            exit 1
          fi
          policy_error="$RUNNER_TEMP/immutable-release-policy-gate-${GITHUB_RUN_ID}.err"
          if ! policy_json="$(GH_TOKEN="$ADMIN_GH_TOKEN" gh api --method GET \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/immutable-releases" 2>"$policy_error")"; then
            cat "$policy_error" >&2
            echo "::error::Could not prove owner-enforced immutable releases before external publication."
            exit 1
          fi
          policy_enabled="$(jq -er '
            if has("enabled") and ((.enabled | type) == "boolean")
            then (.enabled | tostring)
            else error("missing or invalid enabled state")
            end
          ' <<<"$policy_json")"
          policy_enforced="$(jq -er '
            if has("enforced_by_owner") and ((.enforced_by_owner | type) == "boolean")
            then (.enforced_by_owner | tostring)
            else error("missing or invalid owner enforcement state")
            end
          ' <<<"$policy_json")"
          if [ "$policy_enabled" != "true" ] || [ "$policy_enforced" != "true" ]; then
            echo "::error::External publication requires owner-enforced immutable releases (enabled=$policy_enabled enforced_by_owner=$policy_enforced)."
            exit 1
          fi
          echo "Owner-enforced immutable releases proven before any registry or release write."
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Verify checked out tag identity
        env:
          PUBLISH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! git show-ref --verify --quiet "refs/tags/$PUBLISH_REF"; then
            echo "::error::Publish ref '$PUBLISH_REF' is not an existing tag."
            exit 1
          fi
          TAG_SHA="$(git rev-parse "refs/tags/$PUBLISH_REF^{commit}")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "::error::Checked out HEAD $HEAD_SHA does not match tag $PUBLISH_REF at $TAG_SHA."
            exit 1
          fi
          echo "Verified tag $PUBLISH_REF at $TAG_SHA."
      - name: Revalidate immutable tag target against live main history and all required workflows
        id: prerequisite_gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          resolve_remote_tag() {
            local tag="$1" ref_json object_type object_sha tag_json
            ref_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$tag")"
            object_type="$(jq -er '.object.type' <<<"$ref_json")"
            object_sha="$(jq -er '.object.sha' <<<"$ref_json")"
            for _ in {1..10}; do
              if [ "$object_type" = "commit" ]; then
                printf '%s' "$object_sha"
                return 0
              fi
              if [ "$object_type" != "tag" ]; then
                echo "::error::Tag $tag resolves to unsupported Git object type '$object_type'." >&2
                return 1
              fi
              tag_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/tags/$object_sha")"
              object_type="$(jq -er '.object.type' <<<"$tag_json")"
              object_sha="$(jq -er '.object.sha' <<<"$tag_json")"
            done
            echo "::error::Tag $tag exceeds the maximum annotated-tag peel depth." >&2
            return 1
          }
          TAG_SHA="$(resolve_remote_tag "$PUBLISH_REF")"
          assert_target_on_live_main() {
            local relation
            LIVE_MAIN_SHA="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
            relation="$(gh api --method GET "repos/$GITHUB_REPOSITORY/compare/${TAG_SHA}...${LIVE_MAIN_SHA}" --jq '.status')"
            if [ "$relation" != "ahead" ] && [ "$relation" != "identical" ]; then
              echo "::error::Tag $PUBLISH_REF at $TAG_SHA is no longer in live main history at $LIVE_MAIN_SHA (compare status: $relation)."
              exit 1
            fi
            echo "Validated immutable target $TAG_SHA in live main history at $LIVE_MAIN_SHA."
          }
          assert_target_on_live_main

          TARGET_VERSION="$(git show "$TAG_SHA:package.json" | jq -er '.version | select(type == "string" and length > 0)')"
          VERSION_BOUNDARY_SHA="$TAG_SHA"
          version_cursor="$TAG_SHA"
          while version_parent="$(git rev-list --parents -n 1 "$version_cursor" | awk '{print $2}')" && [ -n "$version_parent" ]; do
            if ! parent_package="$(git show "$version_parent:package.json" 2>/dev/null)"; then
              break
            fi
            parent_version="$(jq -er '.version | select(type == "string" and length > 0)' <<<"$parent_package")"
            if [ "$parent_version" != "$TARGET_VERSION" ]; then
              break
            fi
            VERSION_BOUNDARY_SHA="$version_parent"
            version_cursor="$version_parent"
          done

          # Resolve each required workflow by its active file path and numeric
          # workflow ID; display names are not unique security identities.
          bash scripts/require-release-push-workflows.sh "$TAG_SHA"

          # Dependabot Updates is a GitHub-managed dynamic workflow, not a
          # push-triggered YAML workflow. Gate the newest run per ecosystem on
          # the first-parent commits that carry this epoch's exact final config
          # blob, so a later same-version recovery commit cannot skip it.
          bash scripts/require-dependabot-release-evidence.sh require "$TAG_SHA" "$VERSION_BOUNDARY_SHA"

          # A successful CodeQL workflow only proves upload completion. Read
          # and evaluate the SARIF tied to TAG_SHA itself. The alert state of a
          # newer main commit is not historical evidence for this release.
          target_codeql="[]"
          required_codeql_categories=("/language:actions" "/language:javascript-typescript")
          for attempt in {1..12}; do
            assert_target_on_live_main
            analyses_json="$(gh api --paginate --slurp -H "Accept: application/vnd.github+json" "repos/$GITHUB_REPOSITORY/code-scanning/analyses?per_page=100")"
            target_codeql="$(jq -c --arg sha "$TAG_SHA" '[.[][] | select(.commit_sha == $sha and .tool.name == "CodeQL")]' <<<"$analyses_json")"
            codeql_ready=true
            for category in "${required_codeql_categories[@]}"; do
              analysis="$(jq -c --arg category "$category" '[.[] | select(.category == $category)] | sort_by(.id) | last // null' <<<"$target_codeql")"
              if [ "$analysis" = "null" ]; then
                codeql_ready=false
                echo "Waiting for exact CodeQL analysis $category on $TAG_SHA."
                continue
              fi
              analysis_error="$(jq -r '.error // ""' <<<"$analysis")"
              if [ -n "$analysis_error" ]; then
                echo "::error::CodeQL analysis $category failed processing for $TAG_SHA: $analysis_error"
                exit 1
              fi
            done
            if [ "$codeql_ready" = true ]; then
              echo "Both exact CodeQL categories are processed for $TAG_SHA."
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Exact CodeQL analyses were not visible for both categories on $TAG_SHA."
              exit 1
            fi
            sleep 5
          done
          missing_category_count="$(jq '[.[] | select((.category // "") == "")] | length' <<<"$target_codeql")"
          if [ "$missing_category_count" -ne 0 ]; then
            echo "::error::Exact CodeQL evidence contains $missing_category_count analysis object(s) without a category for $TAG_SHA."
            exit 1
          fi
          codeql_category_count=0
          while IFS= read -r category; do
            codeql_category_count=$((codeql_category_count + 1))
            analysis="$(jq -c --arg category "$category" '[.[] | select(.category == $category)] | sort_by(.id) | last' <<<"$target_codeql")"
            analysis_error="$(jq -r '.error // ""' <<<"$analysis")"
            if [ -n "$analysis_error" ]; then
              echo "::error::CodeQL analysis $category failed processing for $TAG_SHA: $analysis_error"
              exit 1
            fi
            analysis_id="$(jq -er --arg category "$category" '[.[] | select(.category == $category)] | sort_by(.id) | last | .id' <<<"$target_codeql")"
            sarif_file="$RUNNER_TEMP/codeql-${analysis_id}.sarif"
            gh api -H "Accept: application/sarif+json" "repos/$GITHUB_REPOSITORY/code-scanning/analyses/$analysis_id" >"$sarif_file"
            result_count="$(jq '[.runs[]?.results[]?] | length' "$sarif_file")"
            if [ "$result_count" -ne 0 ]; then
              echo "::error::Exact CodeQL analysis $category contains $result_count result(s) for $TAG_SHA."
              jq -r '.runs[]?.results[]? | [.ruleId, (.level // "warning"), .message.text] | @tsv' "$sarif_file"
              exit 1
            fi
          done < <(jq -r '[.[] | .category] | unique[]' <<<"$target_codeql")
          echo "Exact CodeQL SARIF gate passed across all $codeql_category_count categories with zero results for $TAG_SHA."

          # Scorecard's intentionally accepted solo-maintainer findings are
          # narrow and explicit. Every other exact-SHA result fails closed.
          target_scorecard="[]"
          for attempt in {1..12}; do
            assert_target_on_live_main
            analyses_json="$(gh api --paginate --slurp -H "Accept: application/vnd.github+json" "repos/$GITHUB_REPOSITORY/code-scanning/analyses?per_page=100")"
            target_scorecard="$(jq -c --arg sha "$TAG_SHA" '[.[][] | select(.commit_sha == $sha and .tool.name == "Scorecard")]' <<<"$analyses_json")"
            scorecard_ready=true
            for category in "supply-chain/local" "supply-chain/online-scm" "supply-chain/branch-protection"; do
              analysis="$(jq -c --arg category "$category" '[.[] | select(.category == $category)] | sort_by(.id) | last // null' <<<"$target_scorecard")"
              if [ "$analysis" = "null" ]; then
                scorecard_ready=false
                echo "Waiting for exact OpenSSF Scorecard analysis $category on $TAG_SHA."
                continue
              fi
              analysis_error="$(jq -r '.error // ""' <<<"$analysis")"
              if [ -n "$analysis_error" ]; then
                echo "::error::OpenSSF Scorecard analysis $category failed processing for $TAG_SHA: $analysis_error"
                exit 1
              fi
            done
            if [ "$scorecard_ready" = true ]; then
              echo "All three exact OpenSSF Scorecard SARIF categories are processed for $TAG_SHA."
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Exact OpenSSF Scorecard SARIF analyses were not visible for all three categories on $TAG_SHA."
              exit 1
            fi
            sleep 5
          done
          for category in "supply-chain/local" "supply-chain/online-scm" "supply-chain/branch-protection"; do
            analysis_id="$(jq -er --arg category "$category" '[.[] | select(.category == $category)] | sort_by(.id) | last | .id' <<<"$target_scorecard")"
            sarif_file="$RUNNER_TEMP/scorecard-${analysis_id}.sarif"
            gh api -H "Accept: application/sarif+json" "repos/$GITHUB_REPOSITORY/code-scanning/analyses/$analysis_id" >"$sarif_file"
            unexpected_results="$(jq '[
              .runs[]?.results[]?
              | select(
                  .ruleId != "MaintainedID" and
                  .ruleId != "CodeReviewID" and
                  .ruleId != "CIIBestPracticesID" and
                  .ruleId != "FuzzingID" and
                  .ruleId != "BranchProtectionID" and
                  .ruleId != "TokenPermissionsID"
                )
            ] | length' "$sarif_file")"
            if [ "$unexpected_results" -ne 0 ]; then
              echo "::error::Exact OpenSSF Scorecard analysis $category contains $unexpected_results non-allowlisted result(s) for $TAG_SHA."
              jq -r '.runs[]?.results[]? | [.ruleId, (.level // "warning"), .message.text] | @tsv' "$sarif_file"
              exit 1
            fi
          done
          echo "Exact OpenSSF Scorecard SARIF gate passed for $TAG_SHA."

          final_tag_sha="$(resolve_remote_tag "$PUBLISH_REF")"
          if [ "$final_tag_sha" != "$TAG_SHA" ]; then
            echo "::error::Release tag changed while the hard gate was running (tag=$final_tag_sha expected=$TAG_SHA)."
            exit 1
          fi
          assert_target_on_live_main
          echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "Independent release gate passed for $PUBLISH_REF at immutable target $TAG_SHA."
      - name: Setup Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Pre-publish gate (format + lint + biome + typecheck)
        run: npm --registry=https://registry.npmjs.org run check
      - name: Verify
        run: npm --registry=https://registry.npmjs.org test
        env:
          CROSS_REVIEW_STUB: "1"
          # v2.4.0 / P1.1 fail-fast: stub activation requires explicit
          # confirmation. The smoke harness is a legitimate stub consumer.
          CROSS_REVIEW_STUB_CONFIRMED: "1"
      - name: Revalidate protected release identity after local validation
        id: hardgate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_REF: ${{ github.ref_name }}
          PUBLISH_EVENT_REF: ${{ github.ref }}
          PUBLISH_REF_TYPE: ${{ github.ref_type }}
          PUBLISH_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          if [ "$PUBLISH_REF_TYPE" != "tag" ] || [ "$PUBLISH_EVENT_REF" != "refs/tags/$PUBLISH_REF" ] || [ "$PUBLISH_REF_PROTECTED" != "true" ]; then
            echo "::error::Protected tag trigger identity changed or is invalid after local validation."
            exit 1
          fi
          ref_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$PUBLISH_REF")"
          object_type="$(jq -er '.object.type' <<<"$ref_json")"
          TAG_SHA="$(jq -er '.object.sha' <<<"$ref_json")"
          for _ in {1..10}; do
            if [ "$object_type" = "commit" ]; then
              break
            fi
            if [ "$object_type" != "tag" ]; then
              echo "::error::Tag $PUBLISH_REF resolves to unsupported Git object type '$object_type'."
              exit 1
            fi
            tag_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/tags/$TAG_SHA")"
            object_type="$(jq -er '.object.type' <<<"$tag_json")"
            TAG_SHA="$(jq -er '.object.sha' <<<"$tag_json")"
          done
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          relation="$(gh api --method GET "repos/$GITHUB_REPOSITORY/compare/${TAG_SHA}...${MAIN_SHA}" --jq '.status')"
          if [ "$TAG_SHA" != "$CHECKED_OUT_SHA" ]; then
            echo "::error::Release tag $TAG_SHA no longer matches checked-out commit $CHECKED_OUT_SHA."
            exit 1
          fi
          if [ "$relation" != "ahead" ] && [ "$relation" != "identical" ]; then
            echo "::error::Release identity changed after local validation (tag=$TAG_SHA checkout=$CHECKED_OUT_SHA main=$MAIN_SHA relation=$relation)."
            exit 1
          fi
          echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "Protected release identity remains $PUBLISH_REF at $TAG_SHA."
      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          PUBLISH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          node scripts/release-policy.mjs validate-semver "$VERSION"
          DISPLAY_TAG="$(node scripts/release-policy.mjs display-tag "$VERSION")"
          PRERELEASE=false
          DIST_TAG=latest
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
            PRERELEASE_SUFFIX="${VERSION#*-}"
            DIST_TAG="${PRERELEASE_SUFFIX%%.*}"
            if [[ "$DIST_TAG" == "latest" || ! "$DIST_TAG" =~ ^[A-Za-z][0-9A-Za-z_-]*$ ]]; then
              DIST_TAG=prerelease
            fi
          fi
          if [ "$PUBLISH_REF" != "$DISPLAY_TAG" ]; then
            echo "::error::Publish tag '$PUBLISH_REF' does not exactly match package.json version '$VERSION' (expected '$DISPLAY_TAG')."
            exit 1
          fi
          if [ "$PRERELEASE" = "true" ] && [ "$DIST_TAG" = "latest" ]; then
            echo "::error::A prerelease must never use the npm latest dist-tag."
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$PUBLISH_REF" >> "$GITHUB_OUTPUT"
          echo "display_tag=$DISPLAY_TAG" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Publish metadata: $NAME@$VERSION -> $PUBLISH_REF ($DIST_TAG; prerelease=$PRERELEASE)"
      - name: Pack the immutable release artifact
        id: pack
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npm --registry=https://registry.npmjs.org pack --pack-destination artifacts
          mapfile -t tarballs < <(find artifacts -maxdepth 1 -type f -name '*.tgz' -print)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one package tarball, found ${#tarballs[@]}."
            exit 1
          fi
          TARBALL="${tarballs[0]}"
          TARBALL_NAME="$(basename "$TARBALL")"
          TARBALL_SHA256="$(sha256sum "$TARBALL" | awk '{print $1}')"
          TARBALL_INTEGRITY="$(node -e '
            const { createHash } = require("node:crypto");
            const { readFileSync } = require("node:fs");
            const bytes = readFileSync(process.argv[1]);
            process.stdout.write(`sha512-${createHash("sha512").update(bytes).digest("base64")}`);
          ' "$TARBALL")"
          node scripts/release-policy.mjs verify-file-sri "$TARBALL" "$TARBALL_INTEGRITY"
          echo "tarball=$TARBALL_NAME" >> "$GITHUB_OUTPUT"
          echo "sha256=$TARBALL_SHA256" >> "$GITHUB_OUTPUT"
          echo "integrity=$TARBALL_INTEGRITY" >> "$GITHUB_OUTPUT"
          echo "Packed immutable artifact $TARBALL_NAME (sha256=$TARBALL_SHA256; SRI=$TARBALL_INTEGRITY)."
      - name: Upload immutable package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-tgz
          path: artifacts/*.tgz
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
    timeout-minutes: 90
  publish-npmjs:
    name: Publish to npmjs.com
    needs: gate
    runs-on: ubuntu-latest
    environment: npm-production
    permissions: write-all
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout immutable release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ needs.gate.outputs.sha }}
          fetch-depth: 0
      - name: Download immutable package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-tgz
          path: artifacts
      - name: Setup Node.js 24 for npmjs
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # npm Trusted Publishing requires npm >=11.5.1.
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@lcv-ideas-software"
          package-manager-cache: false
      - name: Setup hash-verified npm v12 toolchain
        uses: ./.github/actions/setup-npm-toolchain
        with:
          version: ${{ env.NPM_CLI_VERSION }}
          sha512: ${{ env.NPM_CLI_SHA512 }}
      - name: Verify package artifact digest
        env:
          PACKAGE_TARBALL: ${{ needs.gate.outputs.package_tarball }}
          PACKAGE_SHA256: ${{ needs.gate.outputs.package_sha256 }}
          PACKAGE_INTEGRITY: ${{ needs.gate.outputs.package_integrity }}
        run: |
          set -euo pipefail
          test -f "artifacts/$PACKAGE_TARBALL"
          echo "$PACKAGE_SHA256  artifacts/$PACKAGE_TARBALL" | sha256sum --check --strict
          node scripts/release-policy.mjs verify-file-sri "artifacts/$PACKAGE_TARBALL" "$PACKAGE_INTEGRITY"
      - name: Verify trusted publishing toolchain
        run: |
          set -euo pipefail
          node --version
          ACTUAL_NPM_VERSION="$(npm --registry=https://registry.npmjs.org --version)"
          if [ "$ACTUAL_NPM_VERSION" != "$NPM_CLI_VERSION" ]; then
            echo "::error::Expected npm $NPM_CLI_VERSION, got $ACTUAL_NPM_VERSION."
            exit 1
          fi
          echo "Verified npm $ACTUAL_NPM_VERSION for Trusted Publishing and npm v12 policy."
      - name: Install dependencies
        run: npm ci --strict-allow-scripts --no-audit --no-fund
        env:
          STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
      - name: Check npmjs.com package version
        id: npmjs-version
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          PACKAGE_INTEGRITY: ${{ needs.gate.outputs.package_integrity }}
        run: |
          set -euo pipefail
          view_error="$RUNNER_TEMP/npmjs-view-${GITHUB_RUN_ID}.err"
          if package_view="$(npm --registry=https://registry.npmjs.org view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version dist.integrity --json 2>"$view_error")"; then
            normalized_view="$(jq -ce 'if type == "array" and length == 1 then .[0] else . end' <<<"$package_view")"
            published_version="$(jq -er '.version' <<<"$normalized_view")"
            published_integrity="$(jq -er '.["dist.integrity"]' <<<"$normalized_view")"
            if [ "$published_version" != "$PACKAGE_VERSION" ]; then
              echo "::error::npmjs.com returned version $published_version for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              exit 1
            fi
            node scripts/release-policy.mjs verify-sri \
              "$PACKAGE_INTEGRITY" "$published_integrity" \
              "npmjs.com ${PACKAGE_NAME}@${PACKAGE_VERSION}"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npmjs.com with the exact SRI; skipping publish."
          else
            if ! grep -Eq 'E404|404 Not Found|HTTP 404' "$view_error"; then
              cat "$view_error" >&2
              echo "::error::Could not safely determine npmjs.com package state."
              exit 1
            fi
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published on npmjs.com yet."
          fi
      - name: Choose npmjs.com dist-tag without regressing latest
        id: npmjs-tag
        env:
          PACKAGE_NAME: ${{ needs.gate.outputs.name }}
          PACKAGE_VERSION: ${{ needs.gate.outputs.version }}
          PREFERRED_TAG: ${{ needs.gate.outputs.dist_tag }}
        run: |
          set -euo pipefail
          view_error="$RUNNER_TEMP/npmjs-tags-${GITHUB_RUN_ID}.err"
          if tags_view="$(npm --registry=https://registry.npmjs.org view "$PACKAGE_NAME" dist-tags --json 2>"$view_error")"; then
            normalized_tags="$(jq -ce 'if type == "array" and length == 1 then .[0] else . end' <<<"$tags_view")"
            PRIOR_LATEST="$(jq -er 'if type == "object" then (.latest // "") else error("unexpected dist-tags response") end' <<<"$normalized_tags")"
          else
            if ! grep -Eq 'E404|404 Not Found|HTTP 404' "$view_error"; then
              cat "$view_error" >&2
              echo "::error::Could not safely read npmjs.com dist-tags."
              exit 1
            fi
            PRIOR_LATEST=""
          fi
          PUBLISH_TAG="$(node scripts/release-policy.mjs npm-publish-tag \
            "$PACKAGE_VERSION" "$PREFERRED_TAG" "$PRIOR_LATEST")"
          echo "prior_latest=$PRIOR_LATEST" >> "$GITHUB_OUTPUT"
          echo "publish_tag=$PUBLISH_TAG" >> "$GITHUB_OUTPUT"
          echo "npmjs.com monotonic decision: candidate=$PACKAGE_VERSION prior_latest=${PRIOR_LATEST:-missing} publish_tag=$PUBLISH_TAG."
      - name: Revalidate release tag identity before npmjs publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_REF: ${{ needs.gate.outputs.tag }}
          VERIFIED_SHA: ${{ needs.gate.outputs.sha }}
          PUBLISH_EVENT_REF: ${{ github.ref }}
          PUBLISH_REF_TYPE: ${{ github.ref_type }}
          PUBLISH_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          if [ "$PUBLISH_REF_TYPE" != "tag" ] || [ "$PUBLISH_EVENT_REF" != "refs/tags/$PUBLISH_REF" ] || [ "$PUBLISH_REF_PROTECTED" != "true" ]; then
            echo "::error::Protected tag trigger identity is no longer valid."
            exit 1
          fi
          ref_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$PUBLISH_REF")"
          object_type="$(jq -er '.object.type' <<<"$ref_json")"
          TAG_SHA="$(jq -er '.object.sha' <<<"$ref_json")"
          for _ in {1..10}; do
            if [ "$object_type" = "commit" ]; then
              break
            fi
            if [ "$object_type" != "tag" ]; then
              echo "::error::Tag $PUBLISH_REF resolves to unsupported Git object type '$object_type'."
              exit 1
            fi
            tag_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/git/tags/$TAG_SHA")"
