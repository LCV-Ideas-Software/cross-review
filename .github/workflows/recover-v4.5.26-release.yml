name: Recover v04.05.26 GitHub Release

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Exact release, source run, and artifact authorization phrase
        required: true
        type: string

permissions: write-all

# Share the publication FIFO. A recovery must never race a newer tag's npm or
# GitHub latest transition.
concurrency:
  group: release-publication
  queue: max
  cancel-in-progress: false

jobs:
  recover:
    name: Recover exact v04.05.26 release without overwrite
    runs-on: ubuntu-latest
    environment: github-release-recovery
    permissions: write-all
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout trusted main recovery implementation
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Node.js 24 for release-policy verification
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Recover the exact failed release transaction
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMMUTABILITY_TOKEN: ${{ secrets.LCV_AUTOMATION_TOKEN }}
          RECOVERY_CONFIRMATION: ${{ inputs.confirmation }}
          RECOVERY_ACTOR: ${{ github.actor }}
          RECOVERY_ACTOR_ID: ${{ github.actor_id }}
          RECOVERY_EVENT_NAME: ${{ github.event_name }}
          RECOVERY_REF: ${{ github.ref }}
          RECOVERY_REF_TYPE: ${{ github.ref_type }}
          RECOVERY_REPOSITORY: ${{ github.repository }}
          RECOVERY_WORKFLOW_SHA: ${{ github.sha }}
        run: bash scripts/recover-v4.5.26-release.sh

      - name: Remove GitHub Packages recovery credential file
        if: always()
        run: |
          set -euo pipefail
          rm -f -- "${RUNNER_TEMP}/cross-review-release-recovery.npmrc"
    timeout-minutes: 60
